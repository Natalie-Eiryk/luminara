<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enhanced Study - Ms. Luminara</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0e14;
      --card: #141a22;
      --card-border: #1e2832;
      --text: #e8eaed;
      --text-dim: #8b919a;
      --text-muted: #5c636e;
      --correct: #34d399;
      --correct-bg: rgba(52, 211, 153, 0.1);
      --incorrect: #f87171;
      --incorrect-bg: rgba(248, 113, 113, 0.1);
      --luminara: #f5c542;
      --luminara-bg: rgba(245, 197, 66, 0.1);
      --frizzle: #a78bfa;
      --feynman: #60a5fa;
      --xp-gold: #fbbf24;
      --layer-1: #1a2129;
      --layer-2: #1f2833;
      --layer-3: #252f3c;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      line-height: 1.6;
    }

    /* XP BAR */
    .xp-bar-container {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: var(--card-border);
      z-index: 200;
    }

    .xp-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--luminara), var(--xp-gold));
      transition: width 0.5s ease;
    }

    /* HEADER */
    .header {
      position: fixed;
      top: 4px; left: 0; right: 0;
      background: rgba(10, 14, 20, 0.95);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--card-border);
      z-index: 100;
      padding: 0.6rem 1.5rem;
    }

    .header-inner {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header-left { display: flex; align-items: center; gap: 1rem; }

    .logo {
      font-family: 'Crimson Pro', serif;
      font-size: 1rem;
      color: var(--luminara);
      font-style: italic;
    }

    .level-badge {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.25rem 0.6rem;
      background: var(--layer-1);
      border: 1px solid var(--luminara);
      border-radius: 20px;
      font-size: 0.7rem;
      color: var(--luminara);
    }

    .level-badge .icon { font-size: 0.9rem; }

    .streak-badge {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.25rem 0.6rem;
      background: var(--layer-1);
      border-radius: 20px;
      font-size: 0.7rem;
      color: var(--xp-gold);
    }

    .header-stats {
      display: flex;
      gap: 1rem;
      font-size: 0.75rem;
      color: var(--text-dim);
    }

    .header-stats .stat-value {
      color: var(--text);
      font-weight: 600;
    }

    /* MAIN LAYOUT */
    .main-layout {
      display: flex;
      gap: 1.5rem;
      max-width: 1100px;
      margin: 0 auto;
      padding: 5rem 1.5rem 2rem;
    }

    /* SIDEBAR */
    .sidebar {
      width: 280px;
      flex-shrink: 0;
      position: sticky;
      top: 5rem;
      height: fit-content;
    }

    .sidebar-section {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 1rem;
      margin-bottom: 1rem;
    }

    .sidebar-title {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      margin-bottom: 0.75rem;
    }

    /* DUE REVIEWS */
    .due-count {
      font-size: 2rem;
      font-weight: 700;
      color: var(--luminara);
    }

    .due-label {
      font-size: 0.8rem;
      color: var(--text-dim);
    }

    .due-breakdown {
      margin-top: 0.75rem;
      display: flex;
      gap: 0.5rem;
    }

    .due-tag {
      padding: 0.2rem 0.5rem;
      background: var(--layer-1);
      border-radius: 4px;
      font-size: 0.65rem;
      color: var(--text-dim);
    }

    .due-tag.overdue { color: var(--incorrect); }
    .due-tag.today { color: var(--luminara); }
    .due-tag.new { color: var(--correct); }

    /* MASTERY PROGRESS */
    .mastery-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
    }

    .mastery-label {
      flex: 1;
      font-size: 0.75rem;
      color: var(--text-dim);
    }

    .mastery-bar {
      width: 80px;
      height: 6px;
      background: var(--layer-1);
      border-radius: 3px;
      overflow: hidden;
    }

    .mastery-fill {
      height: 100%;
      background: var(--correct);
      border-radius: 3px;
    }

    .mastery-pct {
      font-size: 0.7rem;
      width: 30px;
      text-align: right;
      color: var(--text-dim);
    }

    /* BADGES */
    .badge-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.5rem;
    }

    .badge {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--layer-1);
      border-radius: 8px;
      font-size: 1.2rem;
      opacity: 0.3;
    }

    .badge.earned {
      opacity: 1;
      background: var(--luminara-bg);
      border: 1px solid var(--luminara);
    }

    /* MAIN CONTENT */
    .main-content {
      flex: 1;
      min-width: 0;
    }

    /* QUESTION CARD - ENHANCED */
    .question-card {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      margin-bottom: 1rem;
      overflow: hidden;
    }

    .question-card.answered-correct { border-color: var(--correct); }
    .question-card.answered-incorrect { border-color: var(--incorrect); }

    .q-header {
      padding: 1rem 1.25rem 0.5rem;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .q-meta { font-size: 0.7rem; color: var(--text-muted); }

    .q-tags {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
    }

    .q-tag {
      font-size: 0.6rem;
      padding: 0.15rem 0.4rem;
      background: var(--layer-1);
      border-radius: 4px;
      color: var(--text-muted);
    }

    .q-tag.isotope { color: var(--frizzle); background: rgba(167,139,250,0.1); }
    .q-tag.difficulty { color: var(--luminara); }
    .q-tag.srs { color: var(--correct); }

    .q-body { padding: 0.5rem 1.25rem 1rem; }

    .q-text {
      font-size: 1.05rem;
      font-weight: 500;
      line-height: 1.5;
      margin-bottom: 1rem;
    }

    /* OPTIONS */
    .options-grid { display: flex; flex-direction: column; gap: 0.5rem; }

    .option {
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      padding: 0.85rem 1rem;
      background: var(--layer-1);
      border: 1px solid transparent;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .option:hover:not(.disabled) {
      background: var(--layer-2);
      border-color: var(--text-muted);
    }

    .option.disabled { cursor: default; }
    .option.selected-correct { background: var(--correct-bg); border-color: var(--correct); }
    .option.selected-incorrect { background: var(--incorrect-bg); border-color: var(--incorrect); }
    .option.reveal-correct { background: var(--correct-bg); border-color: var(--correct); }

    .option-marker {
      width: 22px; height: 22px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%;
      background: var(--layer-2);
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--text-dim);
    }

    .option.selected-correct .option-marker,
    .option.reveal-correct .option-marker { background: var(--correct); color: #000; }
    .option.selected-incorrect .option-marker { background: var(--incorrect); color: #fff; }

    .option-text { flex: 1; font-size: 0.95rem; }

    /* SRS CONFIDENCE BUTTONS */
    .srs-buttons {
      display: none;
      padding: 1rem 1.25rem;
      background: var(--layer-1);
      border-top: 1px solid var(--card-border);
      gap: 0.5rem;
    }

    .srs-buttons.show { display: flex; }

    .srs-btn {
      flex: 1;
      padding: 0.6rem;
      border: 1px solid var(--card-border);
      border-radius: 8px;
      background: var(--layer-2);
      color: var(--text-dim);
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.15s;
      text-align: center;
    }

    .srs-btn:hover { background: var(--layer-3); color: var(--text); }

    .srs-btn.again { border-color: var(--incorrect); }
    .srs-btn.again:hover { background: var(--incorrect-bg); color: var(--incorrect); }

    .srs-btn.hard { border-color: var(--xp-gold); }
    .srs-btn.good { border-color: var(--correct); }
    .srs-btn.easy { border-color: var(--feynman); }

    .srs-btn .interval {
      display: block;
      font-size: 0.65rem;
      margin-top: 0.25rem;
      opacity: 0.7;
    }

    /* XP POPUP */
    .xp-popup {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      padding: 1rem 2rem;
      background: var(--luminara);
      color: #000;
      border-radius: 12px;
      font-size: 1.5rem;
      font-weight: 700;
      z-index: 300;
      animation: xpPop 0.8s ease forwards;
      pointer-events: none;
    }

    @keyframes xpPop {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
      30% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
      100% { opacity: 0; transform: translate(-50%, -80%) scale(1); }
    }

    /* EXPLANATION LAYERS */
    .layer-feedback {
      display: none;
      padding: 1rem 1.25rem;
      background: var(--layer-1);
      border-top: 1px solid var(--card-border);
    }

    .layer-feedback.show { display: block; }

    .feedback-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .verdict { font-weight: 600; }
    .verdict.correct { color: var(--correct); }
    .verdict.incorrect { color: var(--incorrect); }

    .expand-btn {
      padding: 0.4rem 0.8rem;
      background: var(--layer-2);
      border: 1px solid var(--card-border);
      border-radius: 6px;
      color: var(--text-dim);
      font-size: 0.75rem;
      cursor: pointer;
    }

    .expand-btn:hover { background: var(--layer-3); color: var(--text); }

    .layer-explain {
      display: none;
      padding: 1.25rem;
      border-top: 1px solid var(--card-border);
    }

    .layer-explain.show { display: block; }
    .layer-explain.luminara { background: var(--luminara-bg); }

    .explain-text {
      font-family: 'Crimson Pro', serif;
      font-size: 1.05rem;
      line-height: 1.8;
    }

    /* CONNECTION MAP */
    .connection-map {
      display: none;
      padding: 1rem 1.25rem;
      background: var(--layer-2);
      border-top: 1px solid var(--card-border);
    }

    .connection-map.show { display: block; }

    .connection-title {
      font-size: 0.7rem;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 0.75rem;
    }

    .connection-nodes {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .connection-node {
      padding: 0.4rem 0.8rem;
      background: var(--layer-3);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      font-size: 0.75rem;
      color: var(--text-dim);
      cursor: pointer;
      transition: all 0.15s;
    }

    .connection-node:hover {
      border-color: var(--luminara);
      color: var(--luminara);
    }

    .connection-node.prerequisite { border-left: 3px solid var(--feynman); }
    .connection-node.related { border-left: 3px solid var(--correct); }
    .connection-node.leads-to { border-left: 3px solid var(--luminara); }

    /* WISDOM LINK */
    .wisdom-box {
      margin-top: 1rem;
      padding: 0.85rem 1rem;
      background: rgba(96, 165, 250, 0.1);
      border-left: 3px solid var(--feynman);
      border-radius: 0 8px 8px 0;
    }

    .wisdom-label {
      font-size: 0.65rem;
      text-transform: uppercase;
      color: var(--feynman);
      margin-bottom: 0.25rem;
    }

    .wisdom-text {
      font-size: 0.9rem;
      color: var(--text);
      font-style: italic;
    }

    /* LOADING */
    .loading {
      text-align: center;
      padding: 4rem;
      color: var(--text-dim);
    }

    /* RESPONSIVE */
    @media (max-width: 900px) {
      .sidebar { display: none; }
      .main-layout { padding: 4rem 1rem 2rem; }
    }
  </style>
</head>
<body>
  <div class="xp-bar-container">
    <div class="xp-bar-fill" id="xpBar" style="width: 35%"></div>
  </div>

  <header class="header">
    <div class="header-inner">
      <div class="header-left">
        <a href="quick-quiz.html" class="logo">Ms. Luminara's Study Lab</a>
        <div class="level-badge">
          <span class="icon">🌿</span>
          <span>Level <span id="userLevel">12</span></span>
        </div>
        <div class="streak-badge">
          🔥 <span id="streakCount">7</span> day streak
        </div>
      </div>
      <div class="header-stats">
        <span>XP: <span class="stat-value" id="totalXp">1,250</span></span>
        <span>Mastery: <span class="stat-value" id="overallMastery">74%</span></span>
      </div>
    </div>
  </header>

  <div class="main-layout">
    <aside class="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-title">Due Today</div>
        <div class="due-count" id="dueCount">12</div>
        <div class="due-label">questions to review</div>
        <div class="due-breakdown">
          <span class="due-tag overdue">3 overdue</span>
          <span class="due-tag today">7 due</span>
          <span class="due-tag new">2 new</span>
        </div>
      </div>

      <div class="sidebar-section">
        <div class="sidebar-title">System Mastery</div>
        <div class="mastery-item">
          <span class="mastery-label">ANS</span>
          <div class="mastery-bar"><div class="mastery-fill" style="width: 87%"></div></div>
          <span class="mastery-pct">87%</span>
        </div>
        <div class="mastery-item">
          <span class="mastery-label">Special Senses</span>
          <div class="mastery-bar"><div class="mastery-fill" style="width: 72%"></div></div>
          <span class="mastery-pct">72%</span>
        </div>
        <div class="mastery-item">
          <span class="mastery-label">Endocrine</span>
          <div class="mastery-bar"><div class="mastery-fill" style="width: 65%"></div></div>
          <span class="mastery-pct">65%</span>
        </div>
      </div>

      <div class="sidebar-section">
        <div class="sidebar-title">Badges</div>
        <div class="badge-grid">
          <div class="badge earned" title="ANS Explorer">⚡</div>
          <div class="badge" title="Sense Master">👁️</div>
          <div class="badge" title="Hormone Herald">🔬</div>
          <div class="badge earned" title="Streak Keeper">🔥</div>
          <div class="badge" title="Speed Demon">⏱️</div>
          <div class="badge" title="Perfect Score">💯</div>
        </div>
      </div>
    </aside>

    <main class="main-content">
      <div class="question-list" id="questionList">
        <div class="loading">Loading enhanced study session...</div>
      </div>
    </main>
  </div>

  <script>
    const Study = {
      questions: [],
      srsData: {},
      userStats: {
        xp: 1250,
        level: 12,
        streak: 7,
        sessionCorrect: 0,
        sessionTotal: 0
      },

      async init() {
        this.loadSrsData();
        await this.loadQuestions();
        this.filterDueQuestions();
        this.renderQuestions();
        this.updateUI();
      },

      loadSrsData() {
        const saved = localStorage.getItem('luminara_srs');
        this.srsData = saved ? JSON.parse(saved) : {};

        const stats = localStorage.getItem('luminara_stats');
        if (stats) {
          this.userStats = { ...this.userStats, ...JSON.parse(stats) };
        }
      },

      saveSrsData() {
        localStorage.setItem('luminara_srs', JSON.stringify(this.srsData));
        localStorage.setItem('luminara_stats', JSON.stringify(this.userStats));
      },

      async loadQuestions() {
        try {
          const registry = await fetch('820.31-core/820.31-question-registry.json').then(r => r.json());
          for (const cat of registry.categories) {
            for (const bank of cat.banks) {
              try {
                const data = await fetch(`${cat.folder}/${bank.file}`).then(r => r.json());
                if (data.questions) {
                  data.questions.forEach(q => {
                    q._category = cat.name;
                    q._bank = bank.name;
                    this.questions.push(q);
                  });
                }
              } catch (e) {}
            }
          }
        } catch (e) {
          console.error('Load failed:', e);
        }
      },

      filterDueQuestions() {
        const now = Date.now();
        this.dueQuestions = this.questions.filter(q => {
          const srs = this.srsData[q.id];
          if (!srs) return true; // New card
          return srs.nextReview <= now;
        });

        // Sort: overdue first, then by due time
        this.dueQuestions.sort((a, b) => {
          const srsA = this.srsData[a.id];
          const srsB = this.srsData[b.id];
          if (!srsA) return -1;
          if (!srsB) return 1;
          return srsA.nextReview - srsB.nextReview;
        });

        document.getElementById('dueCount').textContent = this.dueQuestions.length;
      },

      renderQuestions() {
        const list = document.getElementById('questionList');
        if (!this.dueQuestions.length) {
          list.innerHTML = '<div class="loading">All caught up! No reviews due.</div>';
          return;
        }

        list.innerHTML = this.dueQuestions.slice(0, 10).map((q, idx) =>
          this.renderCard(q, idx)
        ).join('');
      },

      renderCard(q, idx) {
        const srs = this.srsData[q.id] || { interval: 0, easeFactor: 2.5, reviewCount: 0 };
        const isNew = !this.srsData[q.id];

        // Generate isotope tags from question data
        const isotopes = q.isotopes || [`${q._category.toLowerCase().replace(/\s/g, '.')}`];

        return `
          <div class="question-card" data-qid="${q.id}">
            <div class="q-header">
              <span class="q-meta">${q._category} · ${q._bank || ''}</span>
              <div class="q-tags">
                ${isNew ? '<span class="q-tag srs">NEW</span>' : ''}
                ${isotopes.slice(0, 2).map(i => `<span class="q-tag isotope">${i.split('.').pop()}</span>`).join('')}
                <span class="q-tag difficulty">Lvl ${q.difficulty || 2}</span>
              </div>
            </div>

            <div class="q-body">
              <div class="q-text">${q.q}</div>
              <div class="options-grid">
                ${q.options.map((opt, i) => `
                  <div class="option" data-opt="${i}" onclick="Study.answer('${q.id}', ${i})">
                    <span class="option-marker">${String.fromCharCode(65 + i)}</span>
                    <span class="option-text">${opt}</span>
                  </div>
                `).join('')}
              </div>
            </div>

            <!-- SRS Confidence Buttons -->
            <div class="srs-buttons" id="srs-${q.id}">
              <button class="srs-btn again" onclick="Study.rateSrs('${q.id}', 0)">
                Again
                <span class="interval">&lt;1m</span>
              </button>
              <button class="srs-btn hard" onclick="Study.rateSrs('${q.id}', 1)">
                Hard
                <span class="interval">${this.formatInterval(srs.interval * 1.2)}</span>
              </button>
              <button class="srs-btn good" onclick="Study.rateSrs('${q.id}', 2)">
                Good
                <span class="interval">${this.formatInterval(srs.interval * srs.easeFactor)}</span>
              </button>
              <button class="srs-btn easy" onclick="Study.rateSrs('${q.id}', 3)">
                Easy
                <span class="interval">${this.formatInterval(srs.interval * srs.easeFactor * 1.5)}</span>
              </button>
            </div>

            <!-- Feedback -->
            <div class="layer-feedback" id="feedback-${q.id}">
              <div class="feedback-row">
                <span class="verdict" id="verdict-${q.id}"></span>
                <button class="expand-btn" onclick="Study.toggleExplain('${q.id}')">
                  Why? ▼
                </button>
              </div>
            </div>

            <!-- Explanation -->
            <div class="layer-explain luminara" id="explain-${q.id}">
              <div class="explain-text">${q.explain || ''}</div>

              ${q.mechanism?.metaphor ? `
                <div class="wisdom-box">
                  <div class="wisdom-label">Think of it like...</div>
                  <div class="wisdom-text">${q.mechanism.metaphor}</div>
                </div>
              ` : ''}
            </div>

            <!-- Connection Map -->
            <div class="connection-map" id="connections-${q.id}">
              <div class="connection-title">Connected Concepts</div>
              <div class="connection-nodes">
                ${(q.prerequisites || []).map(p => `
                  <span class="connection-node prerequisite" onclick="Study.jumpTo('${p}')">← ${p}</span>
                `).join('')}
                ${(q.related || []).map(r => `
                  <span class="connection-node related">${r}</span>
                `).join('')}
                ${(q.leads_to || []).map(l => `
                  <span class="connection-node leads-to" onclick="Study.jumpTo('${l}')">${l} →</span>
                `).join('')}
              </div>
            </div>
          </div>
        `;
      },

      answer(qid, optIndex) {
        const q = this.questions.find(q => q.id === qid);
        if (!q) return;

        const card = document.querySelector(`[data-qid="${qid}"]`);
        const options = card.querySelectorAll('.option');
        const isCorrect = optIndex === q.answer;

        // Disable options
        options.forEach((opt, i) => {
          opt.classList.add('disabled');
          if (i === q.answer) opt.classList.add('reveal-correct');
          if (i === optIndex && !isCorrect) opt.classList.add('selected-incorrect');
          if (i === optIndex && isCorrect) opt.classList.add('selected-correct');
        });

        // Update card state
        card.classList.add(isCorrect ? 'answered-correct' : 'answered-incorrect');

        // Show feedback and SRS buttons
        const feedback = document.getElementById(`feedback-${qid}`);
        const verdict = document.getElementById(`verdict-${qid}`);
        const srsButtons = document.getElementById(`srs-${qid}`);

        feedback.classList.add('show');
        verdict.textContent = isCorrect ? '✓ Correct!' : `✗ Answer is ${String.fromCharCode(65 + q.answer)}`;
        verdict.classList.add(isCorrect ? 'correct' : 'incorrect');
        srsButtons.classList.add('show');

        // Award XP
        const xp = isCorrect ? 20 : 5;
        this.awardXp(xp);

        // Track session
        this.userStats.sessionCorrect += isCorrect ? 1 : 0;
        this.userStats.sessionTotal++;
        this.saveSrsData();
      },

      rateSrs(qid, rating) {
        const now = Date.now();
        let srs = this.srsData[qid] || {
          interval: 1, // minutes
          easeFactor: 2.5,
          reviewCount: 0,
          nextReview: now
        };

        // SM-2 inspired algorithm
        if (rating === 0) { // Again
          srs.interval = 1;
          srs.easeFactor = Math.max(1.3, srs.easeFactor - 0.2);
        } else if (rating === 1) { // Hard
          srs.interval = Math.max(1, srs.interval * 1.2);
          srs.easeFactor = Math.max(1.3, srs.easeFactor - 0.15);
        } else if (rating === 2) { // Good
          srs.interval = srs.interval < 1 ? 10 : srs.interval * srs.easeFactor;
        } else { // Easy
          srs.interval = srs.interval < 1 ? 4 * 24 * 60 : srs.interval * srs.easeFactor * 1.5;
          srs.easeFactor += 0.1;
        }

        srs.nextReview = now + (srs.interval * 60 * 1000);
        srs.reviewCount++;

        this.srsData[qid] = srs;
        this.saveSrsData();

        // Hide SRS buttons, show confirmation
        const srsButtons = document.getElementById(`srs-${qid}`);
        srsButtons.innerHTML = `<div style="text-align:center;color:var(--correct);padding:0.5rem;">
          Scheduled for ${this.formatInterval(srs.interval)}
        </div>`;

        // Show connections
        document.getElementById(`connections-${qid}`).classList.add('show');
      },

      toggleExplain(qid) {
        const explain = document.getElementById(`explain-${qid}`);
        explain.classList.toggle('show');
      },

      formatInterval(minutes) {
        if (!minutes || minutes < 1) return '<1m';
        if (minutes < 60) return `${Math.round(minutes)}m`;
        if (minutes < 24 * 60) return `${Math.round(minutes / 60)}h`;
        return `${Math.round(minutes / (24 * 60))}d`;
      },

      awardXp(amount) {
        this.userStats.xp += amount;

        // Level up check (100 XP per level)
        const newLevel = Math.floor(this.userStats.xp / 100) + 1;
        if (newLevel > this.userStats.level) {
          this.userStats.level = newLevel;
          this.showXpPopup(`Level ${newLevel}!`);
        } else {
          this.showXpPopup(`+${amount} XP`);
        }

        this.updateUI();
        this.saveSrsData();
      },

      showXpPopup(text) {
        const popup = document.createElement('div');
        popup.className = 'xp-popup';
        popup.textContent = text;
        document.body.appendChild(popup);
        setTimeout(() => popup.remove(), 800);
      },

      updateUI() {
        document.getElementById('totalXp').textContent = this.userStats.xp.toLocaleString();
        document.getElementById('userLevel').textContent = this.userStats.level;
        document.getElementById('streakCount').textContent = this.userStats.streak;

        // XP bar (progress to next level)
        const xpInLevel = this.userStats.xp % 100;
        document.getElementById('xpBar').style.width = `${xpInLevel}%`;

        // Mastery calculation
        const answered = Object.keys(this.srsData).length;
        const total = this.questions.length || 75;
        const mastery = Math.round((answered / total) * 100);
        document.getElementById('overallMastery').textContent = `${mastery}%`;
      },

      jumpTo(qid) {
        // Navigate to related question
        const card = document.querySelector(`[data-qid="${qid}"]`);
        if (card) {
          card.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
      }
    };

    Study.init();
  </script>
</body>
</html>
