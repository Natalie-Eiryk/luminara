    {id:'essay1',section:'pituitary',prompt:'Describe the HPA axis and explain how cortisol negative feedback maintains homeostasis.',answer:`THE HPA AXIS:

HYPOTHALAMUS:
- Paraventricular nucleus neurons release CRH (corticotropin-releasing hormone)
- CRH enters hypophyseal portal system → anterior pituitary
- Triggers: Stress, circadian signals (peak at awakening), inflammatory cytokines

ANTERIOR PITUITARY:
- Corticotrophs have CRH receptors
- CRH binding → cAMP → POMC cleavage → ACTH release
- ACTH pulses follow circadian rhythm

ADRENAL CORTEX:
- Zona fasciculata cells express MC2R (melanocortin-2 receptor)
- ACTH binding → cAMP → StAR protein activation → cholesterol transport → cortisol synthesis
- Cortisol released into bloodstream

NEGATIVE FEEDBACK:
- Cortisol binds glucocorticoid receptors (GR) in hypothalamus and pituitary
- Suppresses CRH transcription and release
- Suppresses POMC transcription and ACTH release
- Result: Rising cortisol turns off its own production

HOMEOSTATIC OUTCOME:
- Morning: Low cortisol → CRH/ACTH rise → cortisol peaks at awakening
- Throughout day: Cortisol feedback limits further production
- Stress: Temporarily overrides feedback, allowing sustained cortisol elevation
- Recovery: Feedback reasserts control, cortisol returns to baseline

CLINICAL CORRELATIONS:
- Cushing's syndrome: Excess cortisol (tumor, exogenous steroids)
- Addison's disease: Cortisol deficiency (adrenal insufficiency)
- Understanding feedback helps diagnose: Measure cortisol + ACTH to localize problem`},
    {id:'essay2',section:'mechanisms',prompt:'Compare peptide hormone signaling (via second messengers) with steroid hormone signaling (via nuclear receptors).',answer:`PEPTIDE HORMONE SIGNALING:

Characteristics:
- Water-soluble (amino acid-based)
- Cannot cross plasma membrane
- Bind cell surface receptors
- Fast responses (seconds to minutes)

Mechanism:
1. Hormone binds membrane receptor (GPCR or receptor tyrosine kinase)
2. Receptor activation triggers intracellular cascade
3. Second messengers amplify signal:
   - cAMP pathway: GPCR → G protein → adenylyl cyclase → cAMP → PKA
   - IP3/DAG pathway: GPCR → Gq → PLC → IP3 + DAG → Ca²⁺ release + PKC
   - Tyrosine kinase: Receptor autophosphorylation → Ras/MAPK or PI3K/Akt
4. Protein kinases phosphorylate target proteins
5. Cellular response (secretion, enzyme activation, permeability changes)

Examples: Insulin, glucagon, ACTH, ADH, epinephrine

STEROID HORMONE SIGNALING:

Characteristics:
- Lipid-soluble (cholesterol-derived)
- Cross plasma membrane freely
- Bind intracellular/nuclear receptors
- Slow responses (hours to days)

Mechanism:
1. Hormone diffuses through plasma membrane
2. Binds cytoplasmic or nuclear receptor (ligand-activated transcription factor)
3. Hormone-receptor complex enters nucleus (if cytoplasmic)
4. Binds DNA hormone response elements (HREs)
5. Recruits coactivators/corepressors
6. Alters gene transcription (mRNA synthesis)
7. New proteins made → cellular response

Examples: Cortisol, aldosterone, testosterone, estrogen, progesterone

THYROID HORMONE:
- Amino acid-derived BUT lipid-soluble (iodinated)
- Enters cells, binds nuclear thyroid hormone receptor (TR)
- Acts like steroid via gene transcription changes

KEY DIFFERENCES:
| Feature | Peptide | Steroid |
|---------|---------|---------|
| Solubility | Water-soluble | Lipid-soluble |
| Receptor location | Membrane | Intracellular/nuclear |
| Mechanism | Second messengers | Gene transcription |
| Speed | Fast (sec-min) | Slow (hours-days) |
| Duration | Brief | Prolonged |
| Amplification | Enzyme cascades | Protein synthesis |`},
    {id:'essay3',section:'metabolic',prompt:'Explain the three categories of endocrine gland stimuli (humoral, neural, hormonal) with specific examples.',answer:`THREE CATEGORIES OF ENDOCRINE STIMULI:

1. HUMORAL STIMULUS:
Definition: Endocrine gland directly senses blood chemical levels

Mechanism:
- Endocrine cells have receptors for the regulated substance
- No intermediate hormone or neural signal needed
- The gland IS the sensor

Examples:
- PARATHYROID: Chief cells have calcium-sensing receptors (CaSR)
  - Low Ca²⁺ → CaSR inactive → PTH released
  - High Ca²⁺ → CaSR active → PTH suppressed

- PANCREATIC BETA CELLS: Sense glucose via GLUT2/glucokinase
  - High glucose → increased ATP → insulin secretion

- ADRENAL ZONA GLOMERULOSA: Senses K⁺ directly
  - High K⁺ → depolarization → aldosterone secretion

2. NEURAL STIMULUS:
Definition: Nerve fibers directly stimulate hormone release

Mechanism:
- Neurons synapse on endocrine cells
- Neurotransmitter triggers hormone release
- Rapid response to CNS commands

Examples:
- ADRENAL MEDULLA: Preganglionic sympathetic fibers release ACh
  - Chromaffin cells have nicotinic receptors
  - ACh → depolarization → epinephrine/norepinephrine release
  - Fastest endocrine response (direct neural connection)

- POSTERIOR PITUITARY: Hypothalamic neurons project axons here
  - Action potentials trigger ADH and oxytocin release
  - Technically neural "release" not synthesis

3. HORMONAL STIMULUS:
Definition: One hormone stimulates release of another (tropic hormones)

Mechanism:
- Tropic hormone from one gland targets another gland
- Creates hierarchical control (hypothalamus → pituitary → target)
- Allows integration and feedback regulation

Examples:
- HPT AXIS: TRH → TSH → T3/T4
- HPA AXIS: CRH → ACTH → Cortisol
- HPG AXIS: GnRH → FSH/LH → Sex steroids
- GHRH → GH → IGF-1

INTEGRATION:
Many glands respond to multiple stimuli:
- Adrenal cortex: ACTH (hormonal) + K⁺ for aldosterone (humoral)
- Pancreas: Glucose (humoral) + ANS input (neural) + incretins (hormonal)
- The three categories are not mutually exclusive`}
  ]
};

let state={correct:0,answered:0,sectionProgress:{}};
examData.sections.forEach(s=>{state.sectionProgress[s.id]={answered:0,total:s.questions.length}});

function render(){const nav=document.getElementById('sectionNav'),content=document.getElementById('examContent');nav.innerHTML='';content.innerHTML='';examData.sections.forEach((sec,si)=>{const navItem=document.createElement('div');navItem.className='nav-item';navItem.innerHTML=`<span>${sec.title.split(':')[0]}</span><span class="progress-pill">${state.sectionProgress[sec.id].answered}/${state.sectionProgress[sec.id].total}</span>`;navItem.onclick=()=>document.getElementById('sec-'+sec.id).scrollIntoView({behavior:'smooth'});nav.appendChild(navItem);const panel=document.createElement('div');panel.className='section-panel';panel.id='sec-'+sec.id;panel.innerHTML=`<h2>${sec.title}</h2>`;let currentType='';sec.questions.forEach((q,qi)=>{if(q.type!==currentType){currentType=q.type;const divider=document.createElement('div');divider.className='question-type-divider';divider.textContent={match:'Matching',tf:'True / False',mc:'Multiple Choice',essay:'Essay'}[q.type]||q.type;panel.appendChild(divider)}panel.appendChild(createQuestionCard(q,si,qi))});const sectionEssays=examData.essays.filter(e=>e.section===sec.id);if(sectionEssays.length){const essayDivider=document.createElement('div');essayDivider.className='question-type-divider';essayDivider.textContent='Essay';panel.appendChild(essayDivider);sectionEssays.forEach(e=>panel.appendChild(createEssayCard(e)))}content.appendChild(panel)})}

function createQuestionCard(q,si,qi){const card=document.createElement('div');card.className='card';card.id=`q-${si}-${qi}`;if(q.type==='match'){card.innerHTML=`<p class="question">${q.prompt}</p><div class="match-grid" id="match-${si}-${qi}"></div><button class="check-btn" id="checkbtn-${si}-${qi}">Check Answers</button>${q.note?`<p class="note" style="display:none;" id="note-${si}-${qi}"><strong>Note:</strong> ${q.note}</p>`:''} `;setTimeout(()=>{const grid=document.getElementById(`match-${si}-${qi}`);q.items.forEach((item,idx)=>{const row=document.createElement('div');row.className='match-row';row.innerHTML=`<div class="match-term">${item}</div><select class="match-select" data-idx="${idx}"><option value="">-- Select --</option>${q.opts.map((o,oi)=>`<option value="${oi}">${o}</option>`).join('')}</select>`;grid.appendChild(row)});document.getElementById(`checkbtn-${si}-${qi}`).onclick=()=>checkMatch(si,qi,q)},0)}else if(q.type==='tf'){card.innerHTML=`<p class="question">${q.q}</p><div class="options"><button class="option-btn" data-val="true"><span class="option-letter">T</span> True</button><button class="option-btn" data-val="false"><span class="option-letter">F</span> False</button></div>${q.note?`<p class="note" style="display:none;" id="note-${si}-${qi}"><strong>Note:</strong> ${q.note}</p>`:''}`;setTimeout(()=>{card.querySelectorAll('.option-btn').forEach(btn=>{btn.onclick=()=>checkTF(si,qi,btn.dataset.val==='true',q.ans,card,q.note)})},0)}else if(q.type==='mc'){card.innerHTML=`<p class="question">${q.q}</p><div class="options">${q.opts.map((o,i)=>`<button class="option-btn" data-idx="${i}"><span class="option-letter">${String.fromCharCode(65+i)}</span> ${o}</button>`).join('')}</div>${q.note?`<p class="note" style="display:none;" id="note-${si}-${qi}"><strong>Note:</strong> ${q.note}</p>`:''}`;setTimeout(()=>{card.querySelectorAll('.option-btn').forEach(btn=>{btn.onclick=()=>checkMC(si,qi,parseInt(btn.dataset.idx),q.ans,card,q.note)})},0)}return card}

function createEssayCard(e){const card=document.createElement('div');card.className='card';card.innerHTML=`<p class="essay-prompt">${e.prompt}</p><button class="essay-toggle" id="toggle-${e.id}">Show Model Answer</button><div class="essay-answer" id="answer-${e.id}">${e.answer}</div>`;setTimeout(()=>{document.getElementById(`toggle-${e.id}`).onclick=()=>{const ans=document.getElementById(`answer-${e.id}`);ans.classList.toggle('show');document.getElementById(`toggle-${e.id}`).textContent=ans.classList.contains('show')?'Hide Model Answer':'Show Model Answer'}},0);return card}

function checkMatch(si,qi,q){const grid=document.getElementById(`match-${si}-${qi}`),rows=grid.querySelectorAll('.match-row');let allCorrect=true,anySelected=false;rows.forEach((row,idx)=>{const sel=row.querySelector('.match-select');if(sel.value==='')return;anySelected=true;sel.disabled=true;if(parseInt(sel.value)===q.ans[idx])row.classList.add('correct');else{row.classList.add('incorrect');allCorrect=false}});if(!anySelected)return;const card=document.getElementById(`q-${si}-${qi}`),section=examData.sections[si];if(!card.dataset.answered){card.dataset.answered='1';state.answered++;state.sectionProgress[section.id].answered++;if(allCorrect){state.correct++;card.classList.add('correct')}else card.classList.add('incorrect');updateScore();const note=document.getElementById(`note-${si}-${qi}`);if(note)note.style.display='block'}document.getElementById(`checkbtn-${si}-${qi}`).disabled=true}

function checkTF(si,qi,selected,correct,card,note){if(card.dataset.answered)return;card.dataset.answered='1';const section=examData.sections[si];state.answered++;state.sectionProgress[section.id].answered++;card.querySelectorAll('.option-btn').forEach(btn=>{btn.disabled=true;const btnVal=btn.dataset.val==='true';if(btnVal===correct)btn.classList.add('reveal-correct');if(btnVal===selected)btn.classList.add(selected===correct?'selected-correct':'selected-wrong')});if(selected===correct){state.correct++;card.classList.add('correct')}else card.classList.add('incorrect');updateScore();const noteEl=document.getElementById(`note-${si}-${qi}`);if(noteEl)noteEl.style.display='block'}

function checkMC(si,qi,selected,correct,card,note){if(card.dataset.answered)return;card.dataset.answered='1';const section=examData.sections[si];state.answered++;state.sectionProgress[section.id].answered++;card.querySelectorAll('.option-btn').forEach(btn=>{btn.disabled=true;const idx=parseInt(btn.dataset.idx);if(idx===correct)btn.classList.add('reveal-correct');if(idx===selected)btn.classList.add(selected===correct?'selected-correct':'selected-wrong')});if(selected===correct){state.correct++;card.classList.add('correct')}else card.classList.add('incorrect');updateScore();const noteEl=document.getElementById(`note-${si}-${qi}`);if(noteEl)noteEl.style.display='block'}

function updateScore(){document.getElementById('runningCorrect').textContent=state.correct;document.getElementById('runningTotal').textContent=state.answered;document.querySelectorAll('.nav-item').forEach((item,i)=>{const sec=examData.sections[i];item.querySelector('.progress-pill').textContent=`${state.sectionProgress[sec.id].answered}/${state.sectionProgress[sec.id].total}`});const total=examData.sections.reduce((a,s)=>a+s.questions.length,0);if(state.answered>=total)showResults()}

function showResults(){const total=examData.sections.reduce((a,s)=>a+s.questions.length,0);document.getElementById('finalPercent').textContent=Math.round((state.correct/total)*100)+'%';document.getElementById('finalCorrect').textContent=state.correct;document.getElementById('finalWrong').textContent=total-state.correct;document.getElementById('finalTotal').textContent=total;document.getElementById('resultsPanel').classList.add('show')}

render();
</script>
</body>
