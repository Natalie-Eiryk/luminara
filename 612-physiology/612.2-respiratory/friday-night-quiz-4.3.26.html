<script>
// Quiz data embedded directly to avoid CORS issues with local files
const quizData = {"id":"612.2-fri-night-quiz","title":"Respiratory System - Friday Night Quiz 4.3.26","category":"respiratory","description":"Comprehensive respiratory physiology quiz covering alveolar structure, gas exchange, respiratory control, and blood gas transport","date_created":"2026-04-03","question_bank":[{"id":5,"type":"true_false","q":"Strong emotions and pain, acting through the limbic system and hypothalamus, send signals to the respiratory centers that modulate respiratory rate and depth.","options":["True","False"],"answer":0,"chapter":"Respiratory Control","explain":"This is true. The limbic system (emotion) and hypothalamus (pain, stress) send descending signals to medullary respiratory centers, overriding normal chemical control. This explains why anxiety causes hyperventilation and why breath-holding becomes unbearable under stress.","optionExplains":[{"text":"Precisely. Emotional and pain pathways descend from the limbic system and hypothalamus directly to the medulla oblongata, modulating the respiratory rhythm. This is why you hyperventilate when anxious or hold your breath when frightened - your emotions literally hijack your breathing pattern.","verdict":"correct"},{"text":"Not quite. While chemical sensors (CO2, O2, pH) are the primary drivers, the limbic system absolutely can override this baseline control. Think about it: you can voluntarily hold your breath, hyperventilate from anxiety, or gasp in pain - all emotional/cortical overrides.","verdict":"incorrect"}],"mechanism":{"title":"Mind Over Breath","content":"The medullary respiratory centers receive input from multiple sources: chemoreceptors (CO2/O2), stretch receptors (lung inflation), and higher brain centers (cortex, limbic system, hypothalamus). During strong emotions, the limbic system and hypothalamus send descending signals that can override normal chemical regulation - explaining hyperventilation during panic attacks, breath-holding during fear, and altered breathing patterns during pain. This is why 'calming your breath' works: voluntary cortical control can counteract limbic disruption.","metaphor":"Like a car's cruise control (chemoreceptors) being overridden by the driver (limbic system) - the automatic system still exists, but emotional input can take manual control."}},{"id":6,"type":"multiple_choice","q":"The walls of the alveoli are composed of two types of cells, type I and type II alveolar cells. The function of type II alveolar cells is to ________.","options":["trap dust and other debris","replace mucus in the alveoli","secrete surfactant","protect the lungs from bacterial invasion"],"answer":2,"chapter":"Alveolar Structure","explain":"Type II alveolar cells (septal cells) secrete pulmonary surfactant, a phospholipid mixture that reduces surface tension and prevents alveolar collapse during expiration. Type I cells handle gas exchange; Type II cells maintain the system.","optionExplains":[{"text":"Dust and debris are trapped by mucus in the conducting airways, not in the alveoli. Alveoli need to stay clean and dry for gas exchange - trapping particles here would block diffusion.","verdict":"incorrect"},{"text":"Alveoli should NOT have mucus - that would create a diffusion barrier. Mucus belongs in the trachea and bronchi above, not in the gas exchange zones.","verdict":"incorrect"},{"text":"Correct! Type II alveolar cells (about 5% of alveolar surface) secrete surfactant - a phospholipid detergent that breaks water's surface tension, preventing alveolar collapse. Without surfactant, lungs would require enormous pressure to re-inflate after each breath.","verdict":"correct"},{"text":"While alveolar macrophages do protect against bacteria, Type II cells specifically make surfactant. Immune defense is a separate cell population (dust cells/macrophages), not the Type II pneumocytes.","verdict":"incorrect"}],"mechanism":{"title":"Surfactant Factory","content":"Type II alveolar cells (cuboidal septal cells) synthesize and secrete pulmonary surfactant - a complex mixture of phospholipids (mainly dipalmitoylphosphatidylcholine) and proteins. Surfactant molecules insert between water molecules lining the alveoli, disrupting hydrogen bonds and reducing surface tension from 70 to 25 dynes/cm. This prevents alveolar collapse at end-expiration and reduces the work of breathing. Premature infants lacking surfactant develop respiratory distress syndrome because their alveoli collapse after each breath.","metaphor":"Like adding dish soap to a bubble - without surfactant (soap), the water's surface tension would collapse the bubble immediately. Type II cells are the soap dispensers keeping 300 million alveolar bubbles inflated."}},{"id":7,"type":"multiple_choice","q":"Surfactant helps to prevent the alveoli from collapsing by ________.","options":["humidifying the air before it enters","interfering with the cohesiveness of water molecules, thereby reducing the surface tension of alveolar fluid","warming the air before it enters","protecting the surface of alveoli from dehydration and other environmental variations"],"answer":1,"chapter":"Alveolar Structure","explain":"Surfactant reduces surface tension by disrupting hydrogen bonds between water molecules in the alveolar fluid layer. Lower surface tension means less force pulling alveoli closed, preventing collapse during expiration.","optionExplains":[{"text":"Humidification happens in the upper airways (nasal cavity, pharynx) before air reaches the alveoli. Surfactant works at the alveolar level, not during air conditioning upstream.","verdict":"incorrect"},{"text":"Precisely. Surfactant molecules (phospholipids) insert between water molecules, disrupting hydrogen bonds and breaking cohesive forces. This reduces surface tension from ~70 to ~25 dynes/cm, preventing the inward collapse force that would otherwise shut alveoli at low lung volumes.","verdict":"correct"},{"text":"Warming also happens in conducting airways (nasal cavity, pharynx), not at the alveoli. By the time air reaches alveoli, it's already warmed to body temperature. Surfactant's role is mechanical (surface tension), not thermal.","verdict":"incorrect"},{"text":"While surfactant does help maintain alveolar integrity, the specific mechanism is reducing surface tension, not general protection. The question asks HOW surfactant prevents collapse - the answer is breaking water cohesion, not broad environmental buffering.","verdict":"incorrect"}],"mechanism":{"title":"Breaking Water's Grip","content":"Water molecules in the thin alveolar fluid layer are strongly attracted to each other via hydrogen bonds, creating surface tension - an inward-pulling force that would collapse alveoli like deflating balloons. Surfactant (mostly phospholipids like DPPC) has a hydrophobic tail that inserts into the air-water interface, physically separating water molecules and breaking their hydrogen bonds. This reduces surface tension by ~65%, dramatically lowering the pressure needed to keep alveoli inflated. Without surfactant, the Law of Laplace (P = 2T/r) would make small alveoli collapse into larger ones.","metaphor":"Like crowdbarring apart magnets - water molecules attract strongly (surface tension), but surfactant molecules wedge between them, reducing the grip and preventing collapse."}},{"id":8,"type":"multiple_choice","q":"The most powerful respiratory stimulus for breathing in a healthy person is ________.","options":["alkalosis","acidosis","loss of oxygen in tissues","increase of carbon dioxide"],"answer":3,"chapter":"Respiratory Control","explain":"Rising CO2 (hypercapnia) is the most potent respiratory stimulus. Central chemoreceptors in the medulla detect increased H+ ions from CO2 + H2O → H2CO3 → H+ + HCO3-, triggering increased ventilation.","optionExplains":[{"text":"Alkalosis (high pH, low CO2) actually INHIBITS breathing - it signals you've been hyperventilating and need to slow down to retain CO2. It's the opposite of a stimulus.","verdict":"incorrect"},{"text":"Acidosis (low pH) does stimulate breathing, but the PRIMARY driver is the CO2 that CAUSES the acidosis. The chemoreceptors respond to CO2/H+, not general acid-base status.","verdict":"incorrect"},{"text":"Low oxygen (hypoxia) is only a backup system via peripheral chemoreceptors in carotid/aortic bodies. Healthy people don't rely on O2 sensors - you'd have to drop below ~60 mmHg PO2 before this kicks in significantly.","verdict":"incorrect"},{"text":"Correct! Rising CO2 (detected as increased H+ in CSF by central chemoreceptors) is the PRIMARY respiratory drive. Even a 5 mmHg increase in PCO2 triggers robust ventilation increases. This is why holding your breath becomes unbearable - CO2 buildup, not O2 lack.","verdict":"correct"}],"mechanism":{"title":"CO2: The Master Switch","content":"Central chemoreceptors in the medulla oblongata monitor cerebrospinal fluid (CSF) pH, which reflects arterial PCO2. CO2 diffuses rapidly across the blood-brain barrier, reacts with water to form carbonic acid (H2CO3), which dissociates into H+ and HCO3-. The H+ ions directly stimulate central chemoreceptors, increasing respiratory drive. Even small PCO2 increases (40 → 45 mmHg) produce large ventilation increases. This is why breath-holding fails due to CO2 buildup, not O2 depletion - the 'air hunger' is CO2-driven.","metaphor":"Like a smoke detector in your brain - CO2 is the smoke, and even a little triggers the alarm. Oxygen sensors are the backup battery that only activate if the main system fails."}},{"id":9,"type":"multiple_choice","q":"Which of the choices below describes the forces that act to pull the lungs away from the thorax wall and thus collapse the lungs?","options":["compliance and the surface tension of the alveolar fluid","the natural elasticity of lung tissue and the negative intrapleural pressure","the diaphragm contraction and external intercostal muscle action","atmospheric pressure and the positive pressure in the alveoli"],"answer":0,"chapter":"Respiratory Mechanics","explain":"Lung elastic recoil (compliance) and alveolar surface tension both pull lungs inward, away from the chest wall. The negative intrapleural pressure opposes these forces, keeping lungs inflated against the thorax.","optionExplains":[{"text":"Correct! Lung compliance (elastic tissue wanting to recoil) and surface tension (water molecules pulling alveoli closed) create inward forces that would collapse lungs if unopposed. The negative intrapleural pressure (-4 mmHg) counteracts these forces, keeping lungs adhered to the thorax.","verdict":"correct"},{"text":"Close, but backwards - elastic recoil is correct, but negative intrapleural pressure OPPOSES lung collapse, it doesn't cause it. The negative pressure keeps lungs inflated against the chest wall.","verdict":"incorrect"},{"text":"Diaphragm and intercostals are inspiratory muscles that EXPAND the thorax - they counteract collapse forces, not cause them. The question asks about passive recoil forces, not active muscle contraction.","verdict":"incorrect"},{"text":"Atmospheric pressure pushes inward on the chest wall, but this isn't what pulls lungs away from the thorax. Alveolar pressure equals atmospheric between breaths. The collapse forces are internal: tissue elasticity and surface tension.","verdict":"incorrect"}],"mechanism":{"title":"The Inward Pull","content":"Lungs naturally want to collapse due to two forces: (1) elastic connective tissue in lung parenchyma that recoils after stretching, and (2) surface tension in alveolar fluid pulling alveoli closed. These create an inward force that pulls lungs away from the thorax wall. The intrapleural space maintains subatmospheric pressure (~754 mmHg vs 760 mmHg atmospheric) that opposes this collapse, keeping the visceral pleura adhered to parietal pleura. If the pleural seal breaks (pneumothorax), lungs collapse immediately due to unopposed elastic recoil.","metaphor":"Like a deflated balloon inside a sealed jar - the balloon (lungs) wants to shrink due to its elastic walls and surface tension, but the vacuum in the jar (negative intrapleural pressure) keeps it pressed against the jar walls."}},{"id":10,"type":"multiple_choice","q":"Which of the following determines lung compliance?","options":["alveolar surface tension","flexibility of the thoracic cage","muscles of inspiration","airway opening"],"answer":0,"chapter":"Respiratory Mechanics","explain":"Lung compliance (stretchability) is primarily determined by alveolar surface tension and elastic tissue. Surface tension contributes ~2/3 of the resistance to lung inflation, making it the dominant factor.","optionExplains":[{"text":"Correct! Alveolar surface tension accounts for roughly 2/3 of lung compliance resistance. The remaining 1/3 comes from elastic connective tissue. This is why surfactant (which reduces surface tension) dramatically improves compliance - without it, lungs become 'stiff' and hard to inflate.","verdict":"correct"},{"text":"Thoracic cage flexibility affects THORACIC compliance (chest wall expandability), not LUNG compliance. The question specifically asks about lung tissue stretchability, which is governed by alveolar surface properties and elastic fibers.","verdict":"incorrect"},{"text":"Inspiratory muscles provide the FORCE to inflate lungs - they don't determine how easily lungs stretch (compliance). Compliance is a passive property of lung tissue; muscles are the active driver.","verdict":"incorrect"},{"text":"Airway opening (patency) affects RESISTANCE to airflow, not compliance. Compliance measures volume change per pressure change (ΔV/ΔP), which depends on alveolar/tissue properties, not airway diameter.","verdict":"incorrect"}],"mechanism":{"title":"Stretchability Science","content":"Lung compliance (C = ΔV/ΔP) measures how easily lungs expand for a given pressure change. Two factors dominate: (1) alveolar surface tension (water cohesion in fluid lining, ~67% of total resistance), and (2) elastic connective tissue (collagen/elastin fibers, ~33%). Diseases alter compliance: emphysema increases it (destroyed elastin = floppy lungs), while fibrosis decreases it (excess collagen = stiff lungs). Surfactant is critical - without it, surface tension rises from 25 to 70 dynes/cm, cutting compliance in half and making breathing exhausting.","metaphor":"Like the stretchiness of a balloon - surface tension is the rubber's tendency to snap back, while elastic tissue is the thickness of the rubber itself. Most resistance comes from surface tension (trying to keep the balloon small), not the rubber structure."}},{"id":11,"type":"multiple_choice","q":"Tidal volume is air ________.","options":["forcibly expelled after normal expiration","inhaled after normal inspiration","remaining in the lungs after forced expiration","exchanged during normal breathing"],"answer":3,"chapter":"Respiratory Volumes","explain":"Tidal volume (TV) is the volume of air moved in or out during a single normal breath at rest - typically ~500 mL. It's the baseline 'tide' that ebbs and flows continuously.","optionExplains":[{"text":"This describes expiratory reserve volume (ERV) - the extra air you can forcibly exhale beyond a normal breath. Normal expiration is passive; ERV requires active muscle contraction.","verdict":"incorrect"},{"text":"This describes inspiratory reserve volume (IRV) - the extra air you can inhale beyond a normal breath. IRV is the 'deep breath' reserve on top of tidal volume.","verdict":"incorrect"},{"text":"This describes residual volume (RV) - the ~1200 mL that stays in lungs even after maximal forced exhalation. RV can't be measured by spirometry; it keeps alveoli from collapsing completely.","verdict":"incorrect"},{"text":"Correct! Tidal volume is the air that moves in during inspiration and out during expiration in a normal, resting breath - about 500 mL per cycle. 'Tidal' because it flows in and out like ocean tides, rhythmically and automatically.","verdict":"correct"}],"mechanism":{"title":"The Breathing Baseline","content":"Tidal volume (TV ≈ 500 mL) represents the normal, resting breath volume - the automatic ventilation your body performs 12-15 times per minute without conscious effort. Of this 500 mL, only ~350 mL reaches alveoli for gas exchange; ~150 mL remains in anatomical dead space (conducting airways). TV can increase during exercise (up to ~3000 mL) by recruiting inspiratory reserve volume (IRV) and expiratory reserve volume (ERV). The term 'tidal' reflects the rhythmic, wavelike pattern of airflow.","metaphor":"Like the normal water level fluctuation in a harbor - not the storm surge (IRV) or extreme low tide (ERV), just the regular, predictable ebb and flow that happens continuously."}},{"id":12,"type":"multiple_choice","q":"Which of the choices below determines the direction of respiratory gas movement?","options":["the temperature","solubility in water","partial pressure gradient","molecular weight"],"answer":2,"chapter":"Gas Exchange","explain":"Gases diffuse DOWN their partial pressure gradients - from high to low pressure. At the alveolus, O2 moves from alveolar air (100 mmHg) to blood (40 mmHg), while CO2 moves from blood (45 mmHg) to alveolar air (40 mmHg).","optionExplains":[{"text":"Temperature affects the RATE of diffusion (kinetic energy), but not the DIRECTION. Gases still flow down pressure gradients regardless of temperature - warmer just means faster movement.","verdict":"incorrect"},{"text":"Solubility affects how MUCH gas dissolves (CO2 is 20x more soluble than O2), but not which DIRECTION it flows. Direction is purely driven by pressure differences.","verdict":"incorrect"},{"text":"Correct! Gases diffuse from areas of high partial pressure to low partial pressure following Fick's Law. O2 flows alveoli → blood (100 → 40 mmHg), while CO2 flows blood → alveoli (45 → 40 mmHg). The gradient determines direction; solubility and membrane area determine rate.","verdict":"correct"},{"text":"Molecular weight affects diffusion SPEED (lighter = faster via Graham's Law), but not DIRECTION. All gases move down their individual pressure gradients regardless of mass.","verdict":"incorrect"}],"mechanism":{"title":"Pressure-Driven Flow","content":"Gas diffusion follows Fick's Law: the rate is proportional to (partial pressure gradient × surface area × solubility) / (membrane thickness × molecular weight^0.5). The DIRECTION is purely determined by partial pressure gradient - gases always flow from high to low pressure. At the alveolar-capillary membrane: O2 (PA = 104, Pv = 40 mmHg) diffuses into blood, while CO2 (Pv = 45, PA = 40 mmHg) diffuses into alveoli. Solubility and surface area affect HOW FAST, but pressure gradient determines WHICH WAY.","metaphor":"Like water flowing downhill - gravity (pressure gradient) determines direction, while pipe diameter (solubility, area) determines flow rate. Water never flows uphill, regardless of pipe size."}},{"id":13,"type":"multiple_choice","q":"Which of the following is correct regarding acclimatization?","options":["High-altitude conditions always result in lower-than-normal hemoglobin saturation levels because less O2 is available to be loaded.","Decreases in arterial PO2 cause the peripheral chemoreceptors to become less responsive to increases in PCO2.","At high altitudes, hemoglobin's affinity for O2 is increased because BPG concentrations increase.","When blood O2 levels decline, the kidneys produce more erythropoietin, which stimulates breakdown of red blood cells in the spleen."],"answer":0,"chapter":"Respiratory Control","explain":"At high altitude, atmospheric PO2 is lower, resulting in lower alveolar and arterial PO2. Even with compensatory mechanisms (hyperventilation, increased RBC production), hemoglobin saturation remains below sea-level values due to reduced O2 availability.","optionExplains":[{"text":"Correct! At altitude, barometric pressure drops (e.g., 380 mmHg at 18,000 ft vs 760 mmHg at sea level), reducing inspired PO2. Despite acclimatization (hyperventilation, more RBCs, increased 2,3-BPG), arterial PO2 and hemoglobin saturation remain lower than sea level because there's simply less O2 to load. Acclimatization helps, but can't fully compensate.","verdict":"correct"},{"text":"Backwards - low arterial PO2 makes peripheral chemoreceptors MORE responsive (sensitized), not less. This is why altitude causes hyperventilation - the carotid bodies are screaming about low O2.","verdict":"incorrect"},{"text":"Opposite effect - increased 2,3-BPG (bisphosphoglycerate) DECREASES hemoglobin's O2 affinity (right-shifts the curve), helping UNLOAD O2 at tissues. This is adaptive because it improves tissue delivery despite lower arterial saturation.","verdict":"incorrect"},{"text":"Correct mechanism (EPO production), wrong effect - erythropoietin stimulates RBC PRODUCTION (erythropoiesis) in bone marrow, not breakdown in the spleen. More RBCs = more O2-carrying capacity, a key altitude adaptation.","verdict":"incorrect"}],"mechanism":{"title":"Thin Air Adaptation","content":"High-altitude acclimatization involves multiple compensations: (1) hyperventilation (increased alveolar ventilation lowers PACO2, raises PAO2), (2) increased 2,3-BPG in RBCs (right-shifts O2-Hb curve for better tissue unloading), (3) renal EPO secretion (more RBCs over weeks), and (4) increased capillary density in tissues. However, these adaptations can't fully overcome the fundamental problem: lower barometric pressure means less O2 molecules enter alveoli. At 18,000 ft (barometric pressure 380 mmHg), even optimal compensation leaves SaO2 around 70-80% vs 97% at sea level.","metaphor":"Like trying to fill a bucket from a weak stream - you can make the bucket bigger (more RBCs), pour more efficiently (2,3-BPG), and work faster (hyperventilation), but if the stream itself is weak (low PO2), the bucket never gets as full as it would from a fire hose (sea-level PO2)."}},{"id":14,"type":"multiple_choice","q":"Respiratory control centers are located in the ________.","options":["medulla and pons","midbrain and medulla","upper spinal cord and medulla","pons and midbrain"],"answer":0,"chapter":"Respiratory Control","explain":"The medullary respiratory center (dorsal and ventral respiratory groups) generates the basic breathing rhythm, while the pontine respiratory group (pneumotaxic and apneustic centers) modulates the pattern.","optionExplains":[{"text":"Correct! The medulla oblongata contains the dorsal respiratory group (DRG, inspiratory pacemaker) and ventral respiratory group (VRG, forced breathing). The pons contains the pneumotaxic center (limits inspiration) and apneustic center (prolongs inspiration). Together: medulla = rhythm generator, pons = pattern modifier.","verdict":"correct"},{"text":"The midbrain is NOT a respiratory control center - it handles visual/auditory reflexes, motor control, and arousal. The medulla is correct, but needs the pons (not midbrain) as its partner.","verdict":"incorrect"},{"text":"The upper spinal cord contains phrenic motor neurons (C3-C5) that innervate the diaphragm, but these are OUTPUT pathways, not control centers. The control centers are in the brainstem (medulla + pons), not the cord.","verdict":"incorrect"},{"text":"Pons is half-right, but the midbrain is wrong. The pons modifies breathing patterns, but the primary rhythm generator is in the MEDULLA. Midbrain handles other functions.","verdict":"incorrect"}],"mechanism":{"title":"Brainstem Breathing Command","content":"Respiratory control is hierarchical: the medulla oblongata generates the basic rhythmic pattern via the dorsal respiratory group (DRG, primarily inspiratory neurons in nucleus tractus solitarius) and ventral respiratory group (VRG, both inspiratory and expiratory neurons). The pons fine-tunes this rhythm: the pneumotaxic center (upper pons) limits inspiration duration (preventing over-inflation), while the apneustic center (lower pons) prolongs inspiration. The DRG receives chemoreceptor input and sets the baseline rhythm; the VRG activates during forced breathing; the pons adjusts the pattern smoothness. Damage to the medulla = no breathing; damage to pons = ataxic (irregular) breathing.","metaphor":"Like an orchestra: the medulla is the conductor setting the tempo and rhythm, while the pons is the concertmaster who smooths out the transitions and prevents musicians from holding notes too long."}},{"id":15,"type":"multiple_choice","q":"Which respiratory-associated muscles would contract or relax during forced expiration, for example blowing up a balloon?","options":["diaphragm would contract, internal intercostals would relax","diaphragm would contract, external intercostals would relax","internal intercostals and abdominal muscles would contract","external intercostals would contract and diaphragm would relax"],"answer":2,"chapter":"Respiratory Mechanics","explain":"Forced expiration requires active muscle contraction to compress the thorax beyond passive recoil. Internal intercostals pull ribs downward/inward, while abdominal muscles compress abdominal contents upward against the diaphragm.","optionExplains":[{"text":"Backwards - during EXPIRATION, the diaphragm RELAXES (domes upward), it doesn't contract. Contraction of the diaphragm (flattening) is inspiration, not expiration.","verdict":"incorrect"},{"text":"Again, diaphragm contraction = inspiration, not expiration. During forced expiration, the diaphragm relaxes while INTERNAL intercostals and abdominals actively compress the thorax.","verdict":"incorrect"},{"text":"Correct! Forced expiration (blowing up a balloon, coughing, playing a trumpet) requires active muscle work: internal intercostals pull ribs down and inward (reducing lateral thoracic diameter), while abdominal muscles (rectus abdominis, external obliques) compress abdominal contents upward, pushing the relaxed diaphragm further into the thorax. This creates positive intrapleural pressure, forcing air out rapidly.","verdict":"correct"},{"text":"External intercostals are inspiratory muscles (lift ribs up and out). During forced EXPIRATION, they relax while INTERNAL intercostals contract. The diaphragm also relaxes during expiration (both quiet and forced).","verdict":"incorrect"}],"mechanism":{"title":"Active Squeeze","content":"Normal expiration is passive - elastic lung recoil does the work. Forced expiration (blowing, coughing, Valsalva) recruits expiratory muscles: (1) internal intercostals (pull ribs down/inward, oppose external intercostals), (2) abdominal muscles (rectus abdominis, external/internal obliques, transversus abdominis) compress abdominal cavity, increasing intra-abdominal pressure and pushing relaxed diaphragm upward into thorax. This active compression creates positive intrapleural pressure (+30 mmHg during cough vs -4 mmHg at rest), rapidly expelling air. Athletes, singers, and wind instrument players develop strong expiratory muscles for precise, sustained forced exhalation.","metaphor":"Like squeezing a bellows - passive expiration is letting the bellows spring back (elastic recoil), but forced expiration is actively crushing it with both hands (internal intercostals + abdominals) to blast air out rapidly."}},{"id":16,"type":"multiple_choice","q":"How is the bulk of carbon dioxide transported in blood?","options":["as bicarbonate ions in plasma after first entering the red blood cells","chemically combined with the amino acids of hemoglobin as carbaminohemoglobin in the red blood cells","as carbonic acid in the plasma","chemically combined with the heme portion of hemoglobin"],"answer":0,"chapter":"Gas Transport","explain":"About 70% of CO2 is transported as bicarbonate (HCO3-). CO2 enters RBCs, carbonic anhydrase converts it to H2CO3, which dissociates to H+ and HCO3-. The HCO3- exits RBCs into plasma via the chloride shift.","optionExplains":[{"text":"Correct! The bulk (~70%) of CO2 transport: (1) CO2 diffuses into RBCs, (2) carbonic anhydrase catalyzes CO2 + H2O → H2CO3, (3) H2CO3 dissociates to H+ + HCO3-, (4) HCO3- leaves RBC (chloride shift), traveling in plasma. The RBC is the factory, but plasma carries the product (HCO3-). This is why CO2 transport is pH-linked.","verdict":"correct"},{"text":"Carbaminohemoglobin carries ~20% of CO2 - significant, but NOT the bulk. CO2 binds to amino groups on globin chains (not heme), forming Hb-CO2. The majority (70%) travels as bicarbonate, not bound to Hb.","verdict":"incorrect"},{"text":"Carbonic acid (H2CO3) is the intermediate form that immediately dissociates to H+ and HCO3-. It doesn't accumulate in plasma - it's an unstable transitional species. The endpoint is bicarbonate ions, not carbonic acid.","verdict":"incorrect"},{"text":"CO2 does NOT bind to heme - that's where O2 binds. CO2 binds to amino acid groups on the GLOBIN portion of hemoglobin (forming carbaminohemoglobin), but this is only ~20% of total transport. Bicarbonate is the dominant form.","verdict":"incorrect"}],"mechanism":{"title":"The Bicarbonate Express","content":"CO2 transport uses three mechanisms: (1) dissolved CO2 (~7%, follows Henry's Law), (2) carbaminohemoglobin (~20%, CO2 binds globin chains), (3) bicarbonate ions (~70%, the dominant form). The bicarbonate mechanism: CO2 enters RBCs → carbonic anhydrase (enzyme) catalyzes CO2 + H2O ⇌ H2CO3 → H2CO3 dissociates to H+ + HCO3-. The H+ binds hemoglobin (buffering blood pH), while HCO3- exits via Band 3 protein (antiporter) in exchange for Cl- (chloride shift). At lungs, the process reverses: HCO3- re-enters RBCs, recombines with H+, forms CO2, which diffuses into alveoli. This system couples CO2 transport to pH buffering.","metaphor":"Like converting cargo into shipping containers - raw CO2 (cargo) enters the RBC warehouse, gets converted to bicarbonate (containers), then shipped through plasma. At the destination (lungs), containers are unpacked back to CO2 for unloading."}},{"id":17,"type":"multiple_choice","q":"The symptoms of hyperventilation may be averted by breathing into a paper bag because it ________.","options":["lowers blood pH levels","helps retain carbon dioxide in the blood","reduces brain perfusion by constricting cerebral blood vessels","helps retain oxygen in the blood"],"answer":1,"chapter":"Respiratory Control","explain":"Hyperventilation blows off too much CO2, causing respiratory alkalosis (high pH). Rebreathing exhaled air (high CO2) restores normal PCO2 levels, correcting pH and relieving symptoms (tingling, dizziness, tetany).","optionExplains":[{"text":"Partially correct mechanism (hyperventilation raises pH, we need to lower it), but the PRIMARY action is retaining CO2, not directly lowering pH. The CO2 retention THEN lowers pH by forming H2CO3. Close, but the direct answer is CO2 retention.","verdict":"incorrect"},{"text":"Correct! Hyperventilation expels too much CO2, causing PCO2 to drop and pH to rise (respiratory alkalosis). Symptoms (tingling fingers, lightheadedness, muscle spasms) result from high pH affecting nerve excitability. Rebreathing exhaled air (which contains CO2) raises PCO2 back toward normal, correcting the alkalosis and stopping symptoms.","verdict":"correct"},{"text":"While low CO2 does cause cerebral vasoconstriction (why you feel dizzy), the TREATMENT goal isn't to reduce perfusion - it's to NORMALIZE CO2. Restoring CO2 actually improves brain perfusion by vasodilating vessels. This answer confuses cause with cure.","verdict":"incorrect"},{"text":"Hyperventilation is NOT an oxygen problem - blood O2 saturation is already near 100% normally. The issue is CO2 depletion (and resulting alkalosis). Rebreathing slightly lowers O2 as a side effect, but the therapeutic effect is CO2 retention.","verdict":"incorrect"}],"mechanism":{"title":"Restoring the Balance","content":"Hyperventilation syndrome: excessive ventilation → excessive CO2 elimination → low PCO2 (hypocapnia) → respiratory alkalosis (pH >7.45). High pH increases nerve/muscle excitability, causing paresthesias (tingling), carpopedal spasm, dizziness, and chest tightness. The paper bag technique: rebreathing exhaled air (~4% CO2 vs 0.04% in fresh air) raises inspired CO2 → raises arterial PCO2 → CO2 + H2O → H2CO3 → lowers pH back to normal. The key is CO2 retention reversing the alkalosis. Modern treatment often uses controlled breathing instead (slower, deeper breaths) to avoid hypoxia risk from prolonged bag breathing.","metaphor":"Like adding acid to an overly alkaline pool - hyperventilation makes blood too basic (high pH), so you add back the acid (CO2) by recycling it from your breath instead of constantly dumping fresh alkaline water (O2-rich, CO2-poor air)."}},{"id":18,"type":"multiple_choice","q":"Which of the following is an appropriate response to carbon monoxide (CO) poisoning?","options":["slow breathing into a paper bag","immediate application of bicarbonate ions to facilitate removal of CO from Hb","hyperbaric oxygen chamber to increase PO2 and clear CO from the body","hyperventilation to exhale CO from the body"],"answer":2,"chapter":"Gas Transport","explain":"CO binds hemoglobin 200-250x more tightly than O2, blocking O2 transport. Hyperbaric oxygen (2-3 atmospheres) massively increases dissolved O2 in plasma AND competitively displaces CO from hemoglobin, reducing half-life from 5 hours to 20 minutes.","optionExplains":[{"text":"Terrible idea - slow breathing would WORSEN hypoxia! CO poisoning victims need maximum O2 delivery, not CO2 retention. Paper bag rebreathing is for hyperventilation (alkalosis), not CO poisoning. This would be fatal.","verdict":"incorrect"},{"text":"Bicarbonate doesn't displace CO from hemoglobin - it's an acid-base buffer, not a competitive O2 analog. The only way to remove CO is by outcompeting it with high O2 partial pressures. Chemical buffers can't break the Hb-CO bond.","verdict":"incorrect"},{"text":"Correct! Hyperbaric oxygen therapy (100% O2 at 2-3 atm) achieves two goals: (1) massively increases dissolved O2 in plasma (enough to sustain tissues WITHOUT hemoglobin), and (2) competitively displaces CO from hemoglobin via mass action - high PO2 accelerates CO unbinding. Reduces CO-Hb half-life from 5 hours (room air) to ~20 minutes (hyperbaric O2).","verdict":"correct"},{"text":"Hyperventilation doesn't help - CO is bound to hemoglobin, not free in blood. You can't 'exhale' CO that's chemically attached to Hb. The issue isn't ventilation adequacy, it's Hb occupation. High-pressure O2 is needed to displace CO, not faster breathing.","verdict":"incorrect"}],"mechanism":{"title":"Oxygen Warfare","content":"Carbon monoxide poisoning: CO binds hemoglobin's heme iron with 200-250x greater affinity than O2, forming carboxyhemoglobin (COHb). This blocks O2 binding sites AND left-shifts the O2-Hb curve (remaining O2 binds tighter, unloads less at tissues). Result: both hypoxic hypoxia (less O2 loaded) and histotoxic hypoxia (less O2 released). Treatment: 100% O2 at 2-3 atmospheres (hyperbaric chamber). Effects: (1) dissolved O2 in plasma reaches ~6 mL/dL (vs 0.3 mL/dL normally), enough to bypass hemoglobin and sustain tissues, (2) high PO2 mass-action drives CO off hemoglobin competitively. Without hyperbaric O2, CO-Hb half-life is ~5 hours; with it, ~20-30 minutes. Time is tissue.","metaphor":"Like evicting a squatter who changed the locks - CO has seized hemoglobin and won't let go. Normal O2 (room air) is too weak to evict it. Hyperbaric O2 is the SWAT team with overwhelming force (high pressure) that kicks out CO AND provides emergency supplies (dissolved O2) while reclaiming the building."}},{"id":19,"type":"multiple_choice","q":"The erythrocyte (red blood cell) count increases after a while when an individual goes from a low to a high altitude because the ________.","options":["concentration of oxygen and/or total atmospheric pressure is lower at high altitudes","temperature is lower at higher altitudes","basal metabolic rate is higher at high altitudes","concentration of oxygen and/or total atmospheric pressure is higher at higher altitudes"],"answer":0,"chapter":"Respiratory Control","explain":"Low atmospheric pressure at altitude → low PO2 → hypoxia → kidneys secrete erythropoietin (EPO) → bone marrow increases RBC production → higher hematocrit compensates for reduced O2 availability.","optionExplains":[{"text":"Correct! Altitude → lower barometric pressure → lower inspired PO2 → arterial hypoxia → renal peritubular cells detect low O2 → secrete erythropoietin (EPO) → EPO stimulates bone marrow erythropoiesis → RBC count rises over days-weeks. More RBCs = more hemoglobin = more O2-carrying capacity, compensating for lower O2 saturation per RBC. This is why altitude training boosts endurance.","verdict":"correct"},{"text":"Temperature is irrelevant to RBC production. Cold doesn't trigger EPO secretion - hypoxia does. While altitude IS colder, that's not why RBC count increases. The driver is low O2 availability, not thermal stress.","verdict":"incorrect"},{"text":"Basal metabolic rate may increase slightly at altitude (cold exposure, increased ventilation work), but BMR doesn't directly stimulate RBC production. The trigger is hypoxia-induced EPO release, not metabolic rate changes.","verdict":"incorrect"},{"text":"Backwards - atmospheric pressure is LOWER at high altitudes, not higher. If pressure/O2 were higher, you wouldn't need more RBCs - you'd have plenty of O2 already. The whole adaptation is in response to O2 SCARCITY, not abundance.","verdict":"incorrect"}],"mechanism":{"title":"Altitude Adaptation","content":"High-altitude erythropoiesis pathway: reduced barometric pressure → lower inspired PO2 → lower alveolar and arterial PO2 → tissue hypoxia → renal peritubular interstitial cells sense O2 via HIF (hypoxia-inducible factor) proteins → HIF stabilization → EPO gene transcription → erythropoietin secretion into blood → EPO binds bone marrow erythroid progenitor cells → accelerated RBC maturation and release → increased hematocrit (can reach 50-60% at high altitude vs 40-45% at sea level). Time course: EPO rises in hours, RBC count increases over days-weeks. Trade-off: more O2 capacity, but higher blood viscosity (increased clotting risk).","metaphor":"Like adding more trucks to a delivery fleet when the roads get slower - can't fix the traffic (low atmospheric O2), but can increase cargo capacity (more RBCs) to deliver the same total oxygen despite each truck carrying less."}},{"id":20,"type":"multiple_choice","q":"Select the correct statement about oxygen transport in blood.","options":["During conditions of acidosis, hemoglobin is able to carry oxygen more efficiently.","Increased BPG levels in the red blood cells enhance oxygen-carrying capacity.","During normal activity, a molecule of hemoglobin returning to the lungs carries one molecule of O2.","A 50% oxygen saturation level of blood returning to the lungs might indicate an activity level higher than normal."],"answer":3,"chapter":"Gas Transport","explain":"Normal venous return has ~75% O2 saturation (3 of 4 heme sites still occupied). If venous blood returns at 50% saturation, tissues extracted MORE O2 than usual, indicating higher metabolic demand (exercise).","optionExplains":[{"text":"Backwards - acidosis (low pH, high H+) causes the Bohr effect: H+ binds hemoglobin, reducing O2 affinity (right-shift). This helps UNLOAD O2 at tissues, but reduces LOADING efficiency at lungs. Acidosis impairs carrying, not enhances it.","verdict":"incorrect"},{"text":"Opposite effect - increased 2,3-BPG (bisphosphoglycerate) DECREASES O2 affinity (right-shift), promoting O2 UNLOADING at tissues. This improves O2 DELIVERY but reduces CARRYING capacity (lower saturation at any PO2). BPG helps release, not binding.","verdict":"incorrect"},{"text":"Incorrect math - normal venous return carries ~3 O2 per Hb (75% saturation), not 1 (25%). Arterial blood is ~4 O2 per Hb (100% sat), venous ~3 O2 (75% sat), so tissues extract 1 of 4, leaving 3 on the return trip.","verdict":"incorrect"},{"text":"Correct! Normal resting: arterial blood 97% saturated (~4 O2/Hb), venous blood 75% saturated (~3 O2/Hb), so tissues extract 25% of available O2. If venous saturation drops to 50%, tissues extracted 50% - DOUBLE the normal extraction. This indicates higher O2 consumption, typical during exercise when muscles burn O2 faster. Lower venous saturation = greater O2 extraction = higher metabolic activity.","verdict":"correct"}],"mechanism":{"title":"Oxygen Extraction Indicator","content":"Oxygen cascade at rest: lungs load Hb to ~97% saturation (PaO2 = 100 mmHg, ~19.7 mL O2/dL blood). Tissues extract ~25% of this O2, leaving venous blood at ~75% saturation (PvO2 = 40 mmHg, ~14.5 mL O2/dL). The a-v O2 difference is ~5 mL/dL. During exercise: tissue PO2 drops (faster consumption), steeper gradient → greater extraction → venous saturation falls to 25-50% (PvO2 = 15-25 mmHg). The a-v difference widens to 15 mL/dL. Venous saturation is thus an indirect measure of tissue O2 demand - low venous saturation = high extraction = high metabolic rate. This is why central venous O2 saturation (ScvO2) is monitored in ICUs to assess adequacy of O2 delivery relative to demand.","metaphor":"Like checking how much fuel trucks return with - if trucks normally come back 75% full (light delivery load), but start returning 50% full (heavy delivery load), you know demand at the destination doubled without even visiting the warehouse."}},{"id":21,"type":"multiple_choice","q":"Which structure is lined with simple squamous epithelium?","options":["alveolus","trachea","nasopharynx","oropharynx"],"answer":0,"chapter":"Alveolar Structure","explain":"Simple squamous epithelium (single layer of flat cells) minimizes diffusion distance. Alveoli need rapid gas exchange, so they're lined with simple squamous epithelium - minimal barrier thickness.","optionExplains":[{"text":"Correct! Alveoli are lined with simple squamous epithelium (Type I alveolar cells) - a single layer of extremely thin, flat cells that minimizes diffusion distance (~0.5 µm total respiratory membrane thickness). This structure-function relationship is perfect for rapid gas exchange. Thin = fast diffusion.","verdict":"correct"},{"text":"Trachea is lined with pseudostratified ciliated columnar epithelium with goblet cells - designed for mucus production and particle trapping, not gas exchange. Thick, protective, secretory - opposite of simple squamous.","verdict":"incorrect"},{"text":"Nasopharynx has pseudostratified ciliated columnar epithelium (respiratory epithelium) - same as trachea. Designed for warming, humidifying, and filtering air, not gas exchange. Needs ciliated cells to sweep mucus.","verdict":"incorrect"},{"text":"Oropharynx is lined with stratified squamous epithelium (multiple layers, flat surface cells) - protection against abrasion from food boluses. Non-keratinized but tough. No gas exchange here; this is the crossroads of digestive and respiratory tracts.","verdict":"incorrect"}],"mechanism":{"title":"Form Follows Function","content":"Epithelial lining changes along the respiratory tract to match function: Conducting zone (nose → terminal bronchioles): pseudostratified ciliated columnar with goblet cells → mucus production, particle trapping, ciliary transport. Respiratory zone (respiratory bronchioles → alveoli): simple squamous epithelium → minimal diffusion barrier. At alveoli specifically: Type I alveolar cells (~95% of surface area, simple squamous, gas exchange) and Type II cells (~5%, cuboidal, surfactant secretion). The respiratory membrane (air-blood barrier) is only ~0.5 µm thick: alveolar epithelium + fused basement membranes + capillary endothelium. Fick's Law demands minimal thickness for maximal diffusion rate.","metaphor":"Like wrapping paper vs plastic wrap - conducting airways use thick wrapping paper (pseudostratified columnar) for protection and function, while alveoli use ultra-thin plastic wrap (simple squamous) to let molecules pass through instantly."}},{"id":22,"type":"multiple_choice","q":"Which of the following is a conducting zone structure?","options":["terminal bronchiole","alveolar duct","alveolar sac","respiratory bronchiole"],"answer":0,"chapter":"Respiratory Anatomy","explain":"The conducting zone conducts air but has no gas exchange - nose to terminal bronchioles (anatomical dead space ~150 mL). The respiratory zone has alveoli for gas exchange - respiratory bronchioles to alveolar sacs.","optionExplains":[{"text":"Correct! Terminal bronchioles are the LAST structure of the conducting zone - they conduct air but have NO alveoli, so no gas exchange occurs. After terminal bronchioles, respiratory bronchioles BEGIN to have scattered alveoli, marking the start of the respiratory zone. Terminal bronchioles = pure conduction, no exchange.","verdict":"correct"},{"text":"Alveolar ducts are respiratory zone structures - they're essentially hallways lined with alveoli, so gas exchange DOES occur along their walls. Not conducting zone; they're in the gas exchange territory.","verdict":"incorrect"},{"text":"Alveolar sacs are respiratory zone - they're clusters of alveoli at the end of alveolar ducts, like bunches of grapes. Pure gas exchange structures, definitionally not conducting zone.","verdict":"incorrect"},{"text":"Respiratory bronchioles are the FIRST structure of the respiratory zone - they have scattered alveoli budding from their walls, so gas exchange begins here. The name literally tells you: 'respiratory' = gas exchange happening.","verdict":"incorrect"}],"mechanism":{"title":"Two Zones","content":"Respiratory tract division: CONDUCTING ZONE (anatomical dead space, ~150 mL): nose → pharynx → larynx → trachea → main bronchi → lobar bronchi → segmental bronchi → bronchioles → terminal bronchioles. Function: air conditioning (warm, humidify, filter), NO gas exchange. RESPIRATORY ZONE (~3 L): respiratory bronchioles (transition, first alveoli appear) → alveolar ducts (walls covered in alveoli) → alveolar sacs (grape-like clusters). Function: GAS EXCHANGE. The boundary is anatomically precise: terminal bronchioles are the last structure with NO alveoli; respiratory bronchioles are the first with scattered alveoli. Conducting zone = zero gas exchange; respiratory zone = where O2/CO2 diffusion happens.","metaphor":"Like airport terminals vs gates - conducting zone is the hallways and corridors that move people (air) toward their destination but where no boarding (gas exchange) happens. Respiratory zone is the actual gates where passengers (O2/CO2) transfer between planes (blood) and terminal (air)."}},{"id":23,"type":"short_answer","q":"Describe how alveolar gas exchange is affected by emphysema and pneumonia.","chapter":"Gas Exchange","explain":"Emphysema destroys alveolar walls, reducing surface area for gas exchange and causing V/Q mismatch (ventilation without adequate perfusion). Pneumonia fills alveoli with fluid/exudate, creating a diffusion barrier and shunt (perfusion without ventilation). Both impair oxygenation but via opposite mechanisms.","model_answer":"EMPHYSEMA: Progressive destruction of alveolar walls and elastic tissue leads to (1) reduced surface area for gas exchange (from ~70 m² toward zero), (2) loss of elastic recoil causing air trapping and hyperinflation, (3) V/Q mismatch - ventilated alveoli lack adequate capillary beds (destroyed), creating dead space. Result: impaired O2 loading (low PaO2), CO2 retention (high PaCO2), barrel chest, and pursed-lip breathing to maintain airway pressure.\n\nPNEUMONIA: Alveolar flooding with inflammatory exudate (fluid, WBCs, bacteria) creates (1) thickened diffusion barrier (fluid layer blocks gas movement), (2) shunt physiology - perfused alveoli are not ventilated (fluid-filled), blood bypasses gas exchange, (3) V/Q mismatch - consolidated regions have perfusion without ventilation. Result: severe hypoxemia (shunt blood mixes with oxygenated blood, lowering overall PaO2), tachypnea, crackles on auscultation.\n\nKEY DIFFERENCE: Emphysema = structural loss (surface area ↓), Pneumonia = functional blockade (barrier ↑).","mechanism":{"title":"Two Paths to Hypoxia","content":"Emphysema pathophysiology: chronic inflammation (smoking, α1-antitrypsin deficiency) → protease/elastase activation → alveolar septal destruction → enlarged air spaces (bullae) → reduced surface area + capillary bed loss → V/Q mismatch (high V, low Q - wasted ventilation). Compensation: polycythemia, increased minute ventilation, pursed-lip breathing. Pneumonia pathophysiology: infection (bacteria, virus) → inflammatory response → capillary leak and exudate into alveolar space → alveolar consolidation → shunt (low V, normal Q - wasted perfusion) + diffusion impairment (fluid barrier). Compensation: tachypnea, accessory muscle use, cough. Both cause hypoxemia, but emphysema develops over years (irreversible) while pneumonia is acute (reversible with antibiotics).","metaphor":"Emphysema is like demolishing half the parking lot - fewer spaces (surface area) to park cars (gas exchange). Pneumonia is like flooding the entire lot - the spaces still exist, but they're underwater and unusable (fluid-filled alveoli)."}},{"id":24,"type":"short_answer","q":"Define anatomical dead space. What is the relationship between anatomical and alveolar dead space? Which value is likely to increase during lung pathology?","chapter":"Respiratory Volumes","explain":"Anatomical dead space (~150 mL) is conducting airways with no gas exchange. Alveolar dead space is ventilated alveoli with no perfusion (V/Q = ∞). Physiological dead space = anatomical + alveolar. Lung pathology (emphysema, PE) increases alveolar dead space.","model_answer":"ANATOMICAL DEAD SPACE: Volume of conducting airways (nose → terminal bronchioles) where NO gas exchange occurs because there are no alveoli - approximately 150 mL or 2.2 mL/kg body weight. Also called 'conducting zone volume.'\n\nALVEOLAR DEAD SPACE: Volume of alveoli that are ventilated but NOT perfused (no capillary blood flow), so gas exchange cannot occur despite air reaching the alveoli. V/Q ratio = infinity (ventilation without perfusion). Normally near zero in healthy lungs.\n\nRELATIONSHIP: Physiological dead space = Anatomical dead space + Alveolar dead space. In healthy individuals, physiological ≈ anatomical (~150 mL) because alveolar dead space is minimal.\n\nPATHOLOGY: ALVEOLAR dead space increases in lung disease:\n- Emphysema: capillary bed destruction → ventilated alveoli lack perfusion\n- Pulmonary embolism: clot blocks blood flow → ventilated regions not perfused\n- Hypotension/shock: reduced pulmonary perfusion → apex alveoli underperfused\n\nAnatomical dead space is fixed by airway anatomy and rarely changes (exception: tracheostomy reduces it by ~50 mL).","mechanism":{"title":"Wasted Ventilation","content":"Dead space quantification uses Bohr equation: VD/VT = (PaCO2 - PECO2) / PaCO2, where VD = dead space volume, VT = tidal volume, PaCO2 = arterial CO2, PECO2 = mixed expired CO2. Principle: dead space air contributes no CO2 (not from blood), so discrepancy between arterial and expired CO2 reflects wasted ventilation. Normal VD/VT ratio = 0.2-0.35 (20-35% of each breath is wasted). Pathological increases: emphysema (VD/VT ≈ 0.5-0.7), pulmonary embolism (VD/VT >0.7). Clinical impact: increased dead space means MORE total ventilation needed to maintain alveolar ventilation - patient must breathe faster/deeper to compensate, increasing work of breathing.","metaphor":"Anatomical dead space is like the hallways in an office building - necessary for access but no work happens there. Alveolar dead space is like empty offices with lights on but no workers - wasted resources. Lung disease empties offices (destroys capillaries), increasing waste."}},{"id":25,"type":"short_answer","q":"After a long scuba diving session on a Caribbean reef, Carl boards a plane to Dallas. He begins to feel pain in his elbow on the flight back. What is happening to him and what are the causes?","chapter":"Gas Transport","explain":"Carl has decompression sickness (DCS, 'the bends'). During diving, high pressure dissolves excess nitrogen in tissues. Flying too soon after diving exposes him to reduced cabin pressure, causing dissolved N2 to form bubbles in joints, causing pain.","model_answer":"DIAGNOSIS: Decompression sickness (DCS), also called 'the bends' - specifically Type I DCS (musculoskeletal/joint pain).\n\nMECHANISM:\n1. DIVING PHASE: At depth (e.g., 30 meters = 4 atm pressure), breathing compressed air → nitrogen (N2) partial pressure increases → N2 dissolves into blood and tissues following Henry's Law (gas solubility ∝ pressure). Longer/deeper dives → more N2 loading.\n\n2. ASCENT: Should ascend slowly with safety stops to allow dissolved N2 to diffuse back into lungs and be exhaled gradually. If Carl ascended properly after diving, N2 begins off-gassing but tissues remain supersaturated.\n\n3. FLIGHT TRIGGER: Commercial aircraft cabin pressure ≈ 0.8 atm (equivalent to 6,000-8,000 ft altitude), LOWER than sea level (1 atm). This rapid pressure reduction during flight → supersaturated tissues can't hold dissolved N2 → N2 comes out of solution forming BUBBLES in tissues/blood (like opening a soda bottle).\n\n4. SYMPTOMS: Bubbles in joints (elbows, shoulders, knees) → pain, bubbles in spinal cord → paralysis (Type II DCS), bubbles in lungs → 'chokes.'\n\nCAUSES:\n- Inadequate surface interval before flying (should wait 18-24 hours after diving)\n- Possibly rapid ascent during diving (inadequate decompression)\n- Reduced cabin pressure acting as second decompression insult\n\nTREATMENT: 100% O2, hyperbaric recompression chamber to redissolve bubbles, then slow controlled decompression.","mechanism":{"title":"Bubble Trouble","content":"Henry's Law: gas solubility in liquid is proportional to partial pressure. At 4 atm (30m depth), PN2 = 0.79 × 4 = 3.16 atm vs 0.79 atm at surface. Tissues equilibrate with this high PN2 over time. During ascent, ambient pressure drops → tissue PN2 exceeds ambient PN2 (supersaturation). If pressure change is SLOW, N2 diffuses into blood → lungs → exhaled (safe). If pressure change is RAPID (fast ascent OR flying too soon), N2 forms bubbles IN SITU. Bubble formation threshold depends on supersaturation ratio. Flying creates second pressure drop: sea level (1 atm) → cabin (0.8 atm) = 20% pressure reduction, enough to nucleate bubbles in already-loaded tissues. Safe practice: no flying for 18-24 hours after diving, or 12 hours minimum after single no-decompression dive.","metaphor":"Like shaking a warm soda vs a cold one - Carl's tissues are the soda, loaded with dissolved gas (N2) from high pressure (diving). Flying opens the cap (reduces pressure) before the gas could slowly escape - BOOM, bubbles everywhere. Cold soda (slow ascent + waiting) releases gas gently; warm shaken soda (flying too soon) explodes."}}]};

let userAnswers = {};
let score = 0;

function renderQuiz() {
  const container = document.getElementById('questions-container');

  quizData.question_bank.forEach((q, index) => {
    const qCard = document.createElement('div');
    qCard.className = 'q-card';
    qCard.id = `question-${q.id}`;

    let optionsHTML = '';

    if (q.type === 'true_false' || q.type === 'multiple_choice') {
      optionsHTML = '<div class="options">';
      q.options.forEach((option, optIdx) => {
        const letter = String.fromCharCode(65 + optIdx); // A, B, C, D
        optionsHTML += `
          <button class="option-btn" data-q-id="${q.id}" data-option="${optIdx}">
            <span class="option-letter">${letter}</span>
            <span>${option}</span>
          </button>
        `;
      });
      optionsHTML += '</div>';
    } else if (q.type === 'short_answer') {
      optionsHTML = `
        <textarea
          class="short-answer-input"
          id="answer-${q.id}"
          placeholder="Type your answer here..."></textarea>
        <button class="submit-btn show" onclick="showShortAnswerExplanation(${q.id})">
          Show Model Answer
        </button>
      `;
    }

    qCard.innerHTML = `
      <div class="q-header">
        <div class="q-num">Q${index + 1}</div>
        <div class="q-chapter">${q.chapter}</div>
      </div>
      <div class="q-text">${q.q || q.question}</div>
      ${optionsHTML}
      <div id="explanation-${q.id}" class="explanation"></div>
    `;

    container.appendChild(qCard);
  });

  // Attach event listeners to option buttons
  document.querySelectorAll('.option-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      const qId = parseInt(this.dataset.qId);
      const optIdx = parseInt(this.dataset.option);
      handleAnswer(qId, optIdx);
    });
  });
}

function handleAnswer(qId, selectedOption) {
  const question = quizData.question_bank.find(q => q.id === qId);
  if (!question || userAnswers[qId] !== undefined) return; // Already answered

  userAnswers[qId] = selectedOption;
  const isCorrect = selectedOption === question.answer;

  if (isCorrect) {
    score++;
    document.getElementById('score').textContent = score;
  }

  // Update UI
  const qCard = document.getElementById(`question-${qId}`);
  qCard.classList.add(isCorrect ? 'answered-correct' : 'answered-incorrect');

  // Disable all options and highlight correct/incorrect
  const buttons = qCard.querySelectorAll('.option-btn');
  buttons.forEach((btn, idx) => {
    btn.classList.add('disabled');
    btn.style.pointerEvents = 'none';

    if (idx === question.answer) {
      btn.classList.add('correct');
    } else if (idx === selectedOption) {
      btn.classList.add('incorrect');
    }
  });

  // Show explanation
  showExplanation(qId, selectedOption);

  // Check if all questions answered
  checkCompletion();
}

function showExplanation(qId, selectedOption) {
  const question = quizData.question_bank.find(q => q.id === qId);
  const explanationDiv = document.getElementById(`explanation-${qId}`);

  let explanationHTML = '<div class="explanation-title">Ms. Luminara explains:</div>';

  if (question.optionExplains && question.optionExplains[selectedOption]) {
    explanationHTML += `<div class="explanation-text">${question.optionExplains[selectedOption].text}</div>`;
  } else if (question.explain) {
    explanationHTML += `<div class="explanation-text">${question.explain}</div>`;
  }

  if (question.mechanism) {
    explanationHTML += `
      <div class="mechanism">
        <div class="mechanism-title">${question.mechanism.title}</div>
        <div class="mechanism-content">${question.mechanism.content}</div>
        ${question.mechanism.metaphor ?
          `<div class="mechanism-metaphor">💡 ${question.mechanism.metaphor}</div>` : ''}
      </div>
    `;
  }

  explanationDiv.innerHTML = explanationHTML;
  explanationDiv.classList.add('show');
}

function showShortAnswerExplanation(qId) {
  const question = quizData.question_bank.find(q => q.id === qId);
  const explanationDiv = document.getElementById(`explanation-${qId}`);

  let explanationHTML = '';

  if (question.model_answer) {
    explanationHTML += `
      <div class="model-answer">
        <div class="model-answer-title">Model Answer:</div>
        <div class="model-answer-text">${question.model_answer}</div>
      </div>
    `;
  }

  if (question.mechanism) {
    explanationHTML += `
      <div class="mechanism">
        <div class="mechanism-title">${question.mechanism.title}</div>
        <div class="mechanism-content">${question.mechanism.content}</div>
        ${question.mechanism.metaphor ?
          `<div class="mechanism-metaphor">💡 ${question.mechanism.metaphor}</div>` : ''}
      </div>
    `;
  }

  explanationDiv.innerHTML = explanationHTML;
  explanationDiv.classList.add('show');

  // Mark as "answered" (for short answer, we don't score it)
  userAnswers[qId] = true;
  checkCompletion();
}

function checkCompletion() {
  const mcQuestions = quizData.question_bank.filter(q =>
    q.type === 'true_false' || q.type === 'multiple_choice'
  );

  const answeredCount = Object.keys(userAnswers).length;
  const totalCount = quizData.question_bank.length;

  if (answeredCount === totalCount) {
    showResults();
  }
}

function showResults() {
  const mcQuestions = quizData.question_bank.filter(q =>
    q.type === 'true_false' || q.type === 'multiple_choice'
  );

  const totalMC = mcQuestions.length;
  const percentage = Math.round((score / totalMC) * 100);

  document.getElementById('final-score').textContent = `${score} / ${totalMC}`;
  document.getElementById('percentage').textContent = `${percentage}%`;
  document.getElementById('results').style.display = 'block';

  // Scroll to results
  document.getElementById('results').scrollIntoView({ behavior: 'smooth' });
}

// Initialize quiz when page loads
document.addEventListener('DOMContentLoaded', function() {
  renderQuiz();
});
</script>
</body>
</html>
