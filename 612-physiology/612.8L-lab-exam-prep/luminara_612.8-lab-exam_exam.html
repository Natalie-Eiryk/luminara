<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dewey 612.8 Lab Exam Prep | Exercises 15-25 | Ms. Luminara</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Source+Sans+Pro:wght@400;600&family=DM+Mono&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0e0e12;
      --panel: #16161c;
      --border: #2a2a35;
      --cyan: #61e8e1;
      --purple: #d4a5ff;
      --teal: #47d7e2;
      --green: #a0eec0;
      --red: #ff6b6b;
      --yellow: #ffe066;
      --orange: #ffb347;
      --text: #eeeff3;
      --muted: #9090a0;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Source Sans Pro', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
    }
    h1, h2, h3 { font-family: 'Playfair Display', serif; }
    .sidebar {
      width: 260px;
      background: var(--panel);
      border-right: 1px solid var(--border);
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0; left: 0;
      height: 100vh;
      overflow-y: auto;
    }
    .sidebar h2 { color: var(--cyan); font-size: 1.15rem; margin-bottom: 1rem; }
    .nav-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.55rem 0.75rem;
      border-radius: 8px;
      margin-bottom: 0.35rem;
      cursor: pointer;
      transition: background 0.2s;
      font-size: 0.92rem;
    }
    .nav-item:hover, .nav-item.active { background: #222230; }
    .nav-item .progress-pill {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      background: #222230;
      padding: 0.15rem 0.55rem;
      border-radius: 999px;
    }
    .sidebar-footer {
      margin-top: auto;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
      text-align: center;
      font-size: 0.85rem;
      color: var(--muted);
    }
    .main {
      flex: 1;
      margin-left: 260px;
      padding: 2.5rem 3rem 4rem;
      max-width: 900px;
    }
    .exam-title { font-size: 2rem; margin-bottom: 0.25rem; }
    .exam-meta { color: var(--muted); margin-bottom: 2rem; font-size: 0.95rem; }
    .section-panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem 2rem 2rem;
      margin-bottom: 2rem;
    }
    .section-panel h2 { font-size: 1.35rem; margin-bottom: 1.15rem; }
    .question-type-divider {
      text-transform: uppercase;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      color: var(--purple);
      margin: 1.5rem 0 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .question-type-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .card {
      background: #1c1c25;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.1rem 1.25rem;
      margin-bottom: 1rem;
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    .card.correct { border-color: var(--green); box-shadow: 0 0 6px var(--green); }
    .card.incorrect { border-color: var(--red); box-shadow: 0 0 6px var(--red); }
    .card p.question { font-weight: 600; margin-bottom: 0.85rem; }
    .note { font-size: 0.85rem; color: var(--muted); margin-top: 0.75rem; }
    .note strong { color: var(--yellow); }
    .options { display: flex; flex-direction: column; gap: 0.5rem; }
    .option-btn {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      background: #222230;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.6rem 0.9rem;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      width: 100%;
      text-align: left;
      color: var(--text);
      font-size: 0.95rem;
    }
    .option-btn:hover:not(:disabled) { border-color: var(--cyan); }
    .option-btn:disabled { cursor: not-allowed; opacity: 0.75; }
    .option-btn.selected-correct { border-color: var(--green); background: rgba(160,238,192,0.12); }
    .option-btn.selected-wrong { border-color: var(--red); background: rgba(255,107,107,0.12); }
    .option-btn.reveal-correct { border-color: var(--green); }
    .option-letter {
      font-family: 'DM Mono', monospace;
      font-weight: 600;
      font-size: 0.85rem;
      color: var(--cyan);
    }
    .match-grid { display: flex; flex-direction: column; gap: 0.6rem; }
    .match-row { display: flex; align-items: center; gap: 0.65rem; }
    .match-term {
      flex: 1;
      background: #222230;
      padding: 0.55rem 0.75rem;
      border-radius: 6px;
      font-weight: 600;
    }
    .match-select {
      flex: 1;
      padding: 0.55rem 0.75rem;
      border-radius: 6px;
      background: #222230;
      border: 1px solid var(--border);
      color: var(--text);
    }
    .match-select:focus { outline: none; border-color: var(--cyan); }
    .match-row.correct .match-select { border-color: var(--green); }
    .match-row.incorrect .match-select { border-color: var(--red); }
    .essay-prompt { font-weight: 600; margin-bottom: 0.85rem; }
    .essay-toggle {
      background: linear-gradient(135deg, #6f5dcc, #47d7e2);
      border: none;
      border-radius: 6px;
      padding: 0.55rem 1.1rem;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .essay-toggle:hover { opacity: 0.88; }
    .essay-answer {
      margin-top: 0.85rem;
      padding: 1rem;
      background: #222230;
      border-radius: 8px;
      display: none;
      white-space: pre-wrap;
      font-size: 0.95rem;
      line-height: 1.6;
    }
    .essay-answer.show { display: block; }
    .check-btn {
      margin-top: 0.9rem;
      background: linear-gradient(135deg, var(--purple), var(--cyan));
      border: none;
      border-radius: 6px;
      padding: 0.55rem 1.1rem;
      color: #000;
      font-weight: 600;
      cursor: pointer;
    }
    .check-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .floating-score {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.85rem 1.35rem;
      font-family: 'DM Mono', monospace;
      z-index: 100;
      display: flex;
      gap: 0.75rem;
      align-items: center;
    }
    .floating-score .correct-count { color: var(--green); }
    .floating-score .wrong-count { color: var(--red); }
    .results-panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2rem;
      display: none;
      text-align: center;
    }
    .results-panel.show { display: block; }
    .results-panel h2 { font-size: 1.75rem; margin-bottom: 0.5rem; }
    .results-percentage {
      font-family: 'DM Mono', monospace;
      font-size: 3.5rem;
      color: var(--cyan);
      margin: 1rem 0;
    }
    .results-breakdown {
      display: flex;
      justify-content: center;
      gap: 2rem;
      margin: 1.5rem 0;
    }
    .results-breakdown .stat { text-align: center; }
    .results-breakdown .stat-num { font-size: 1.8rem; font-weight: 700; }
    .results-breakdown .stat-label { font-size: 0.85rem; color: var(--muted); }
    .restart-btn {
      margin-top: 1rem;
      background: linear-gradient(135deg, var(--purple), var(--cyan));
      border: none;
      border-radius: 8px;
      padding: 0.75rem 2rem;
      color: #000;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
    }

    /* ===== SCAFFOLDING STYLES ===== */
    .scaffold-toggle {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      margin-top: 0.75rem;
      padding: 0.4rem 0.8rem;
      background: transparent;
      border: 1px solid var(--orange);
      border-radius: 6px;
      color: var(--orange);
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .scaffold-toggle:hover {
      background: rgba(255, 179, 71, 0.1);
    }
    .scaffold-toggle.active {
      background: rgba(255, 179, 71, 0.15);
    }
    .scaffold-toggle .icon {
      font-size: 1rem;
    }

    .scaffold-panel {
      display: none;
      margin-top: 1rem;
      padding: 1rem;
      background: linear-gradient(135deg, rgba(255, 179, 71, 0.05), rgba(212, 165, 255, 0.05));
      border: 1px solid var(--orange);
      border-radius: 10px;
    }
    .scaffold-panel.show {
      display: block;
    }

    .scaffold-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid rgba(255, 179, 71, 0.3);
    }
    .scaffold-title {
      color: var(--orange);
      font-weight: 600;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .scaffold-progress {
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      color: var(--muted);
    }
    .scaffold-dots {
      display: flex;
      gap: 0.35rem;
    }
    .scaffold-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--border);
    }
    .scaffold-dot.complete { background: var(--green); }
    .scaffold-dot.current { background: var(--orange); box-shadow: 0 0 4px var(--orange); }

    .scaffold-question {
      margin-bottom: 1rem;
      padding: 0.75rem;
      background: rgba(0,0,0,0.2);
      border-radius: 8px;
    }
    .scaffold-question.answered {
      opacity: 0.7;
    }
    .scaffold-q-text {
      font-size: 0.95rem;
      margin-bottom: 0.5rem;
      color: var(--text);
    }
    .scaffold-hint {
      font-size: 0.8rem;
      color: var(--purple);
      font-style: italic;
      margin-bottom: 0.65rem;
      padding-left: 0.5rem;
      border-left: 2px solid var(--purple);
    }
    .scaffold-options {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }
    .scaffold-opt {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 0.75rem;
      background: #222230;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .scaffold-opt:hover:not(:disabled) {
      border-color: var(--orange);
    }
    .scaffold-opt:disabled {
      cursor: not-allowed;
      opacity: 0.7;
    }
    .scaffold-opt.correct {
      border-color: var(--green);
      background: rgba(160, 238, 192, 0.1);
    }
    .scaffold-opt.incorrect {
      border-color: var(--red);
      background: rgba(255, 107, 107, 0.1);
    }
    .scaffold-opt .letter {
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      color: var(--orange);
    }

    .scaffold-feedback {
      margin-top: 0.65rem;
      padding: 0.65rem;
      border-radius: 6px;
      font-size: 0.85rem;
      line-height: 1.5;
    }
    .scaffold-feedback.correct-fb {
      background: rgba(160, 238, 192, 0.1);
      border-left: 3px solid var(--green);
    }
    .scaffold-feedback.incorrect-fb {
      background: rgba(255, 107, 107, 0.1);
      border-left: 3px solid var(--red);
    }
    .scaffold-feedback strong {
      color: var(--green);
    }
    .scaffold-feedback.incorrect-fb strong {
      color: var(--red);
    }

    .scaffold-summary {
      margin-top: 1rem;
      padding: 0.85rem;
      background: rgba(160, 238, 192, 0.08);
      border: 1px solid var(--green);
      border-radius: 8px;
    }
    .scaffold-summary h4 {
      color: var(--green);
      font-size: 0.85rem;
      margin-bottom: 0.65rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .scaffold-summary ul {
      list-style: none;
      padding: 0;
    }
    .scaffold-summary li {
      font-size: 0.85rem;
      margin-bottom: 0.4rem;
      padding-left: 1.2rem;
      position: relative;
    }
    .scaffold-summary li::before {
      content: '✓';
      position: absolute;
      left: 0;
      color: var(--green);
    }

    @media (max-width: 900px) {
      .sidebar { display: none; }
      .main { margin-left: 0; padding: 1.5rem; }
    }

    /* Section Images Styles */
    .section-images {
      margin: 1rem 0 1.5rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    .section-images-toggle {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1rem;
      background: rgba(97, 232, 225, 0.1);
      cursor: pointer;
      transition: background 0.2s;
    }
    .section-images-toggle:hover {
      background: rgba(97, 232, 225, 0.15);
    }
    .toggle-icon { font-size: 1.1rem; }
    .toggle-text { flex: 1; color: var(--cyan); font-weight: 600; }
    .toggle-arrow { color: var(--muted); }
    .section-images-content {
      padding: 1rem;
      background: rgba(0,0,0,0.2);
    }
    .image-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 0.75rem;
    }
    .image-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0.5rem;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .image-item:hover {
      border-color: var(--cyan);
      transform: translateY(-2px);
    }
    .image-thumb {
      width: 100%;
      height: 80px;
      object-fit: contain;
      background: #ffffff;
      border-radius: 4px;
      padding: 4px;
    }
    .image-label {
      margin-top: 0.4rem;
      font-size: 0.7rem;
      color: var(--muted);
      text-align: center;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      width: 100%;
    }

    /* Image Modal */
    .image-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.9);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 10000;
    }
    .modal-content {
      position: relative;
      background: var(--panel);
      padding: 1.5rem;
      border-radius: 12px;
      max-width: 95vw;
      max-height: 95vh;
      overflow: auto;
      text-align: center;
    }
    .modal-close {
      position: absolute;
      top: 0.5rem;
      right: 1rem;
      font-size: 2rem;
      color: var(--muted);
      cursor: pointer;
    }
    .modal-close:hover { color: var(--red); }
    .modal-content h3 {
      margin-bottom: 1rem;
      color: var(--cyan);
    }
    .modal-content img {
      background: #ffffff;
      padding: 1rem;
      border-radius: 8px;
    }
  </style>
</head>

  <h2>Exam Sections</h2>
  <nav id="sectionNav"></nav>
  <div class="sidebar-footer">Ms. Luminara<br/>Dewey 612.8 Lab</div>
</aside>

<main class="main">
  <h1 class="exam-title">Lab Exam Prep Comprehensive</h1>
  <p class="exam-meta">Dewey 612.8 | Exercises 15-25 | 109 Questions | Scaffolding Available</p>

  <div id="examContent"></div>

  <div id="resultsPanel" class="results-panel">
    <h2>Exam Complete!</h2>
    <div class="results-percentage" id="finalPercent">0%</div>
    <div class="results-breakdown">
      <div class="stat"><div class="stat-num correct-count" id="finalCorrect">0</div><div class="stat-label">Correct</div></div>
      <div class="stat"><div class="stat-num wrong-count" id="finalWrong">0</div><div class="stat-label">Incorrect</div></div>

<div class="floating-score">
  <span>Score:</span>
  <span class="correct-count" id="runningCorrect">0</span>/<span id="runningTotal">0</span>

<script>
// Scaffolding data for each question - Ms. Luminara's guided learning
const scaffoldData = {
  // Section 1: Nervous Tissue
  'nervous-tissue-1': {
    scaffolds: [
      { q: 'What are the two main categories of cells in nervous tissue?', hint: 'One type transmits signals, the other provides support...', opts: ['Neurons and neuroglia', 'Axons and dendrites', 'Myelin and nodes', 'Gray and white matter'], ans: 0, explain: 'Neurons conduct electrical signals; neuroglia (glial cells) support, protect, and nourish neurons. In tissue sections, neurons are larger with distinctive shapes.' },
      { q: 'What is a "multipolar" neuron?', hint: 'Think about the number of processes extending from the cell body...', opts: ['A neuron with one process', 'A neuron with two processes', 'A neuron with many processes (multiple dendrites + one axon)', 'A neuron without processes'], ans: 2, explain: 'Multipolar neurons have multiple dendrites (receiving signals) and one axon (sending signals). This is the most common neuron type in the CNS.' },
      { q: 'Which part of the neuron contains the nucleus?', hint: 'This is the "central command" of the cell...', opts: ['Axon', 'Dendrite', 'Cell body (soma)', 'Myelin sheath'], ans: 2, explain: 'The cell body (soma) contains the nucleus and organelles. Under a microscope, it appears as a large, rounded structure - the key feature for identifying neurons.' }
    ],
    summary: ['Nervous tissue = neurons (signal) + neuroglia (support)', 'Multipolar = multiple dendrites + one axon', 'Cell body (soma) is large with visible nucleus']
  },
  'nervous-tissue-2': {
    scaffolds: [
      { q: 'What is myelin primarily made of?', hint: 'Think about what makes something waterproof and insulating...', opts: ['Mostly protein', 'Mostly carbohydrate', 'Mostly lipid (70-80% fat)', 'Mostly water'], ans: 2, explain: 'Myelin is 70-80% lipid, making it an excellent electrical insulator with a white appearance.' },
      { q: 'Osmium tetroxide stain binds strongly to:', hint: 'This is why fat appears dark in tissue preparations...', opts: ['Proteins', 'Nucleic acids', 'Lipids (fats)', 'Carbohydrates'], ans: 2, explain: 'Osmium binds to lipids and turns them dark/black. Since myelin is lipid-rich, it appears as dark rings.' },
      { q: 'The axoplasm (cytoplasm inside the axon) would appear as:', hint: 'Think about what is NOT lipid-rich...', opts: ['Dark (like myelin)', 'Light/clear (surrounded by dark myelin)', 'Red', 'Blue'], ans: 1, explain: 'Axoplasm lacks the lipid content of myelin, appearing light in the center - creating the "donut" appearance.' }
    ],
    summary: ['Myelin is 70-80% lipid', 'Osmium stains lipids dark', 'Result: dark ring (myelin) around light center (axoplasm)']
  },
  'nervous-tissue-3': {
    scaffolds: [
      { q: 'In anatomical terminology, "posterior" and "dorsal" both mean:', hint: 'Think about the back of the body...', opts: ['Front side', 'Back side', 'Side', 'Top'], ans: 1, explain: 'Posterior = dorsal = toward the back. In the spinal cord, the dorsal side faces your back muscles.' },
      { q: 'What is the difference between a "sulcus" and a "fissure"?', hint: 'Think shallow vs. deep...', opts: ['Sulcus is deeper', 'Fissure is deeper', 'They are the same', 'Sulcus is only in brain'], ans: 1, explain: 'A fissure is DEEP; a sulcus is SHALLOW. This helps orient the spinal cord.' },
      { q: 'Which groove is deeper - dorsal or ventral side?', hint: 'Anterior median FISSURE vs posterior median SULCUS...', opts: ['Dorsal (posterior) is deeper', 'Ventral (anterior) is deeper', 'Both are equal', 'Neither has a groove'], ans: 1, explain: 'Ventral (anterior) median FISSURE is deep. Dorsal (posterior) median SULCUS is shallow.' }
    ],
    summary: ['Posterior = dorsal = back; Anterior = ventral = front', 'Fissure = deep; Sulcus = shallow', 'Anterior fissure is DEEP; Posterior sulcus is SHALLOW']
  },
  'nervous-tissue-4': {
    scaffolds: [
      { q: 'Sensory information enters the spinal cord through which root?', hint: 'Sensory neurons are in the dorsal root ganglion...', opts: ['Ventral root', 'Dorsal root', 'Lateral root', 'Central root'], ans: 1, explain: 'Sensory fibers enter through the DORSAL root. The dorsal root ganglion contains sensory neuron cell bodies.' },
      { q: 'Motor commands exit the spinal cord through which root?', hint: 'Motor = movement = going OUT to muscles...', opts: ['Ventral root', 'Dorsal root', 'Lateral root', 'Central root'], ans: 0, explain: 'Motor fibers exit through the VENTRAL root. Bell-Magendie law: dorsal = sensory IN, ventral = motor OUT.' },
      { q: 'Following dorsal=sensory and ventral=motor, where are motor neuron cell bodies?', hint: 'The horns follow the same pattern as the roots...', opts: ['Dorsal horn', 'Ventral horn', 'Central canal', 'White matter'], ans: 1, explain: 'Motor neuron cell bodies are in the VENTRAL horn (matching ventral root = motor OUT).' }
    ],
    summary: ['Bell-Magendie: Dorsal = sensory IN, Ventral = motor OUT', 'Dorsal root ganglion = sensory cell bodies', 'Ventral horn = motor neuron cell bodies']
  },
  'nervous-tissue-5': {
    scaffolds: [
      { q: 'Which cells produce myelin in the PNS?', hint: 'Named after a German physiologist...', opts: ['Oligodendrocytes', 'Schwann cells', 'Astrocytes', 'Microglia'], ans: 1, explain: 'Schwann cells myelinate axons in the PNS. Each wraps around one segment of ONE axon.' },
      { q: 'Why does myelin appear white?', hint: 'Think about myelin composition...', opts: ['High protein content', 'High lipid (fat) content', 'High water content', 'Light reflection'], ans: 1, explain: 'Myelin is 70-80% lipid. Fat appears white, hence "white matter."' },

      answer: `Multipolar neurons are the most common neuron type, with a characteristic structure: one large cell body (soma) containing the nucleus and most organelles, multiple dendrites branching outward to receive signals from thousands of other neurons, and one axon that may extend great distances to transmit signals.

MYELINATION AND CONDUCTION:
The myelin sheath is formed by glial cells wrapping their plasma membranes around the axon in tight spirals:
- In the CNS: oligodendrocytes myelinate multiple axon segments
- In the PNS: Schwann cells myelinate one segment of one axon

Myelin is 70-80% lipid and acts as an electrical insulator, increasing membrane resistance and decreasing capacitance. This prevents ion leakage and enables faster signal propagation.

NODES OF RANVIER:
Nodes of Ranvier are 1-2 μm gaps between myelin segments where the axon membrane is exposed. These gaps contain dense concentrations of voltage-gated Na+ channels (1000-2000 per μm² vs. ~25 in internodes).

The result is saltatory conduction: action potentials "jump" from node to node rather than propagating continuously. This increases conduction velocity 50-100 times compared to unmyelinated fibers of the same diameter, allowing signals to travel at speeds up to 120 m/s.

This system optimizes both speed and energy efficiency—regenerating the action potential only at nodes rather than along the entire axon length.`

3. CEREBRAL AQUEDUCT: Narrow channel through the midbrain

4. FOURTH VENTRICLE: Between pons/medulla and cerebellum

CSF FLOW PATHWAY:

2. CIRCULATION: Lateral ventricles → interventricular foramina → third ventricle → cerebral aqueduct → fourth ventricle
3. EXIT: Through apertures into subarachnoid space
4. ABSORPTION: Arachnoid granulations (villi) project into dural venous sinuses, acting as one-way valves to return CSF to blood

CSF FUNCTIONS:

SPINOTHALAMIC PATHWAY:

- CONTRALATERAL loss of pain/temperature (spinothalamic has already crossed)

THE MECHANISM:

At rest (viewing distant objects):
- Ciliary muscle is RELAXED
- Ciliary body ring is large (pulled outward by elastic choroid)
- Zonular fibers are TAUT (under tension)
- Lens is held relatively FLAT (low refractive power)

For near vision:
1. Parasympathetic stimulation (CN III, Edinger-Westphal nucleus → ciliary ganglion)
2. Ciliary muscle CONTRACTS
3. Ciliary body ring becomes smaller (moves toward lens)
4. Zonular fibers become SLACK (tension released)
5. Elastic lens BULGES (becomes more spherical)
6. Refractive power increases by up to 15 diopters

This seems paradoxical: muscle contraction leads to relaxation of the suspensory ligaments. The key is understanding that the ciliary muscle forms a ring—when it contracts, the ring gets smaller.

THE NEAR TRIAD:
Accommodation occurs with two other reflexes:
1. Pupil constriction (increases depth of field)
2. Convergence (both eyes turn inward)

PRESBYOPIA (AGE-RELATED LOSS):

The lens continues growing throughout life, adding new fibers at the surface while compressing older fibers centrally. This causes:
- Increased lens density
- Decreased elasticity
- Reduced accommodative range

Accommodative amplitude by age:
- Age 10: ~14 diopters (can focus at 7 cm)
- Age 25: ~10 diopters
- Age 45: ~4 diopters
- Age 60: ~1 diopter (can barely focus at 100 cm)

By the mid-40s, most people need reading glasses because the lens can no longer bulge sufficiently for near focus, even though the ciliary muscle still contracts normally.

This is why presbyopia is universal and inevitable—it's a mechanical problem with the aging lens, not a muscular weakness.`

1. EXTERNAL EAR:
- Auricle (pinna) collects and funnels sound waves
- External auditory canal channels sound to the eardrum
- Canal resonance amplifies frequencies around 3000 Hz (speech range)

2. TYMPANIC MEMBRANE:
- Thin membrane vibrates in response to air pressure waves
- Converts airborne sound to mechanical vibration
- Attached to malleus handle

3. MIDDLE EAR OSSICLES:
- Malleus (attached to eardrum)
- Incus (connects malleus to stapes)
- Stapes (footplate in oval window)
- Transmit vibrations from air to cochlear fluid

4. OVAL WINDOW → COCHLEA:
- Stapes footplate pushes perilymph
- Pressure wave travels through scala vestibuli
- Basilar membrane vibrates (tonotopic organization)
- Hair cells in organ of Corti transduce to neural signals

THE IMPEDANCE MATCHING PROBLEM:

Sound traveling from air to fluid would normally lose ~99.9% of its energy (30 dB) because of the impedance mismatch—fluid is much harder to move than air. The middle ear solves this through two mechanisms:

1. AREA RATIO:
- Tympanic membrane area: ~55 mm²
- Stapes footplate area: ~3.2 mm²
- Ratio: ~17:1
- Force concentrated over smaller area increases pressure

2. LEVER ACTION:
- Malleus handle is longer than incus long process
- Mechanical advantage: ~1.3:1
- Additional force amplification

COMBINED GAIN:
- 17 × 1.3 ≈ 22× pressure amplification
- This is ~25-27 dB—almost perfectly compensating for the impedance mismatch
- Without this amplification, we would effectively be deaf

PROTECTIVE MECHANISMS:
The acoustic reflex (tensor tympani and stapedius muscles) can dampen the ossicular chain in response to loud sounds, reducing transmission by up to 15 dB. However, the reflex has a latency of 25-150 ms, so it cannot protect against sudden impulse sounds like gunshots.`

function renderSectionImages(sectionId) {
  const images = sectionImages[sectionId];
  if (!images || images.length === 0) return '';

  const basePath = '../assets/diagrams';

  return `
    <div class="section-images">
      <div class="section-images-toggle" onclick="toggleSectionImages('${sectionId}')">
        <span class="toggle-icon">📷</span>
        <span class="toggle-text">Reference Images (${images.length})</span>
        <span class="toggle-arrow" id="arrow-${sectionId}">▼</span>
      </div>
      <div class="section-images-content" id="images-${sectionId}" style="display: none;">
        <div class="image-grid">
          ${images.map(img => `
            <div class="image-item" onclick="showImageModal('${img.file}', '${img.title}')">
              <img src="${basePath}/${img.file}"
                   alt="${img.title}"
                   class="image-thumb"
                   onerror="this.parentElement.style.display='none'"
                   loading="lazy">
              <span class="image-label">${img.title}</span>
            </div>
          `).join('')}
        </div>
      </div>
    </div>`;
}

function toggleSectionImages(sectionId) {
  const content = document.getElementById(`images-${sectionId}`);
  const arrow = document.getElementById(`arrow-${sectionId}`);
  if (content.style.display === 'none') {
    content.style.display = 'block';
    arrow.textContent = '▲';
  } else {
    content.style.display = 'none';
    arrow.textContent = '▼';
  }
}

function showImageModal(file, title) {
  const modal = document.createElement('div');
  modal.className = 'image-modal';
  modal.innerHTML = `
    <div class="modal-content">
      <span class="modal-close" onclick="this.parentElement.parentElement.remove()">&times;</span>
      <h3>${title}</h3>
      <img src="../assets/diagrams/${file}" alt="${title}" style="max-width: 90vw; max-height: 80vh;">
    </div>
  `;
  modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
  document.body.appendChild(modal);
}

/* ── rendering + scoring logic ── */
let answered = 0, correct = 0;
const sectionProgress = {};
const scaffoldState = {}; // track scaffold progress per question

function render() {
  const nav = document.getElementById('sectionNav');
  const content = document.getElementById('examContent');
  nav.innerHTML = '';
  content.innerHTML = '';

  examData.sections.forEach((sec, si) => {
    sectionProgress[sec.id] = { total: sec.questions.length, done: 0 };

    const navItem = document.createElement('div');
    navItem.className = 'nav-item';
    navItem.innerHTML = `<span>${sec.title.split(':')[0]}</span><span class="progress-pill" id="prog-${sec.id}">0/${sec.questions.length}</span>`;
    navItem.onclick = () => document.getElementById(`sec-${sec.id}`).scrollIntoView({ behavior: 'smooth' });
    nav.appendChild(navItem);

    const panel = document.createElement('section');
    panel.className = 'section-panel';
    panel.id = `sec-${sec.id}`;
    let html = `<h2>${sec.title}</h2>`;

    // Add section reference images
    html += renderSectionImages(sec.id);

    const grouped = { match: [], tf: [], mc: [] };
    sec.questions.forEach((q, qi) => grouped[q.type].push({ ...q, idx: qi }));

    if (grouped.match.length) {
      html += `<div class="question-type-divider">Matching</div>`;
      grouped.match.forEach(q => { html += renderMatch(sec.id, q); });
    }
    if (grouped.tf.length) {
      html += `<div class="question-type-divider">True / False</div>`;
      grouped.tf.forEach(q => { html += renderTF(sec.id, q); });
    }
    if (grouped.mc.length) {
      html += `<div class="question-type-divider">Multiple Choice</div>`;
      grouped.mc.forEach(q => { html += renderMC(sec.id, q); });
    }

    const sectionEssays = examData.essays.filter(e => e.section === sec.id);
    if (sectionEssays.length) {
      html += `<div class="question-type-divider">Essay</div>`;
      sectionEssays.forEach(e => { html += renderEssay(e); });
    }

    panel.innerHTML = html;
    content.appendChild(panel);
  });
  updateScore();
}

function renderMatch(secId, q) {
  const id = `${secId}-${q.idx}`;
  let optionsHtml = q.opts.map((o, i) => `<option value="${i}">${o}</option>`).join('');
  let rows = q.items.map((item, i) => `
    <div class="match-row" id="mr-${id}-${i}">
      <span class="match-term">${item}</span>
      <select class="match-select" data-idx="${i}"><option value="">Select...</option>${optionsHtml}</select>
    </div>`).join('');
  return `<div class="card" id="card-${id}">
    <p class="question">${q.prompt}</p>
    <div class="match-grid">${rows}</div>
    <button class="check-btn" onclick="checkMatch('${secId}',${q.idx})">Check</button>
    ${q.note ? `<p class="note" style="display:none;" id="note-${id}"><strong>Note:</strong> ${q.note}</p>` : ''}
  </div>`;
}

function renderTF(secId, q) {
  const id = `${secId}-${q.idx}`;
  const hasScaffold = q.scaffoldId && scaffoldData[q.scaffoldId];
  return `<div class="card" id="card-${id}">
    <p class="question">${q.q}</p>
    <div class="options">
      <button class="option-btn" onclick="checkTF('${secId}',${q.idx},true,this)"><span class="option-letter">T</span> True</button>
      <button class="option-btn" onclick="checkTF('${secId}',${q.idx},false,this)"><span class="option-letter">F</span> False</button>
    </div>
    ${hasScaffold ? renderScaffoldToggle(q.scaffoldId) : ''}
    ${q.note ? `<p class="note" style="display:none;" id="note-${id}"><strong>Note:</strong> ${q.note}</p>` : ''}
  </div>`;
}

function renderMC(secId, q) {
  const id = `${secId}-${q.idx}`;
  const letters = ['A','B','C','D'];
  const hasScaffold = q.scaffoldId && scaffoldData[q.scaffoldId];
  let btns = q.opts.map((o, i) => `<button class="option-btn" data-i="${i}" onclick="checkMC('${secId}',${q.idx},${i},this)"><span class="option-letter">${letters[i]}</span> ${o}</button>`).join('');
  return `<div class="card" id="card-${id}">
    <p class="question">${q.q}</p>
    <div class="options">${btns}</div>
    ${hasScaffold ? renderScaffoldToggle(q.scaffoldId) : ''}
    ${q.note ? `<p class="note" style="display:none;" id="note-${id}"><strong>Note:</strong> ${q.note}</p>` : ''}
  </div>`;
}

function renderScaffoldToggle(scaffoldId) {
  const data = scaffoldData[scaffoldId];
  if (!data) return '';

  scaffoldState[scaffoldId] = { current: 0, completed: [] };

  const dots = data.scaffolds.map((_, i) =>
    `<div class="scaffold-dot ${i === 0 ? 'current' : ''}" id="dot-${scaffoldId}-${i}"></div>`
  ).join('');

  return `
    <button class="scaffold-toggle" onclick="toggleScaffold('${scaffoldId}')">
      <span class="icon">🪜</span> Need Help? Build Understanding
    </button>
    <div class="scaffold-panel" id="scaffold-panel-${scaffoldId}">
      <div class="scaffold-header">
        <span class="scaffold-title"><span class="icon">🪜</span> Ms. Luminara's Scaffolding</span>
        <div class="scaffold-dots">${dots}</div>
      </div>
      <div id="scaffold-content-${scaffoldId}">
        ${renderScaffoldQuestion(scaffoldId, 0)}
      </div>
    </div>
  `;
}

function renderScaffoldQuestion(scaffoldId, index) {
  const data = scaffoldData[scaffoldId];
  const s = data.scaffolds[index];
  const letters = ['A','B','C','D'];

  return `
    <div class="scaffold-question" id="scaffold-q-${scaffoldId}-${index}">
      <div class="scaffold-q-text">${s.q}</div>
      ${s.hint ? `<div class="scaffold-hint">${s.hint}</div>` : ''}
      <div class="scaffold-options">
        ${s.opts.map((o, i) => `
          <button class="scaffold-opt" onclick="answerScaffold('${scaffoldId}', ${index}, ${i})">
            <span class="letter">${letters[i]}</span> ${o}
          </button>
        `).join('')}
      </div>
    </div>
  `;
}

function toggleScaffold(scaffoldId) {
  const panel = document.getElementById(`scaffold-panel-${scaffoldId}`);
  const toggle = panel.previousElementSibling;
  panel.classList.toggle('show');
  toggle.classList.toggle('active');
}

function answerScaffold(scaffoldId, index, answer) {
  const data = scaffoldData[scaffoldId];
  const s = data.scaffolds[index];
  const isCorrect = answer === s.ans;
  const state = scaffoldState[scaffoldId];

  // Disable options
  const container = document.getElementById(`scaffold-q-${scaffoldId}-${index}`);
  container.classList.add('answered');
  const buttons = container.querySelectorAll('.scaffold-opt');
  buttons.forEach((btn, i) => {
    btn.disabled = true;
    if (i === s.ans) btn.classList.add('correct');
    if (i === answer && !isCorrect) btn.classList.add('incorrect');
  });

  // Show feedback
  const feedback = document.createElement('div');
  feedback.className = `scaffold-feedback ${isCorrect ? 'correct-fb' : 'incorrect-fb'}`;
  feedback.innerHTML = `<strong>${isCorrect ? '✓ Correct!' : '✗ Not quite.'}</strong> ${s.explain}`;
  container.appendChild(feedback);

  // Update dot
  const dot = document.getElementById(`dot-${scaffoldId}-${index}`);
  dot.classList.remove('current');
  dot.classList.add('complete');

  // Mark as completed
  state.completed.push(index);

  // Add next scaffold or summary
  const contentEl = document.getElementById(`scaffold-content-${scaffoldId}`);

  if (index < data.scaffolds.length - 1) {
    // Show next scaffold question
    setTimeout(() => {
      const nextIndex = index + 1;
      const nextDot = document.getElementById(`dot-${scaffoldId}-${nextIndex}`);
      if (nextDot) nextDot.classList.add('current');

      const newQ = document.createElement('div');
      newQ.innerHTML = renderScaffoldQuestion(scaffoldId, nextIndex);
      contentEl.appendChild(newQ.firstElementChild);
      newQ.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 800);
  } else {
    // All scaffolds complete - show summary
    setTimeout(() => {
      const summary = document.createElement('div');
      summary.className = 'scaffold-summary';
      summary.innerHTML = `
        <h4>✓ What You've Learned</h4>
        <ul>${data.summary.map(s => `<li>${s}</li>`).join('')}</ul>
      `;
      contentEl.appendChild(summary);
      summary.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 800);
  }
}

function renderEssay(e) {
  return `<div class="card" id="card-${e.id}">
    <p class="essay-prompt">${e.prompt}</p>
    <button class="essay-toggle" onclick="toggleEssay('${e.id}')">Show Model Answer</button>
    <div class="essay-answer" id="ans-${e.id}">${e.answer}</div>
  </div>`;
}

function toggleEssay(id) { document.getElementById('ans-' + id).classList.toggle('show'); }

function checkMatch(secId, idx) {
  const q = examData.sections.find(s => s.id === secId).questions[idx];
  const id = `${secId}-${idx}`;
  const card = document.getElementById('card-' + id);
  let allCorrect = true;
  q.items.forEach((_, i) => {
    const row = document.getElementById(`mr-${id}-${i}`);
    const sel = row.querySelector('select');
    const chosen = parseInt(sel.value);
    if (chosen === q.ans[i]) {
      row.classList.add('correct');
    } else {
      row.classList.add('incorrect');
      allCorrect = false;
    }
    sel.disabled = true;
  });
  card.classList.add(allCorrect ? 'correct' : 'incorrect');
  card.querySelector('.check-btn').disabled = true;
  const noteEl = document.getElementById('note-' + id);
  if (noteEl) noteEl.style.display = 'block';
  recordAnswer(secId, allCorrect);
}

function checkTF(secId, idx, ans, btn) {
  const q = examData.sections.find(s => s.id === secId).questions[idx];
  const id = `${secId}-${idx}`;
  const card = document.getElementById('card-' + id);
  const isCorrect = ans === q.ans;
  card.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
  btn.classList.add(isCorrect ? 'selected-correct' : 'selected-wrong');
  if (!isCorrect) {
    card.querySelectorAll('.option-btn').forEach(b => {
      if ((q.ans && b.textContent.includes('True')) || (!q.ans && b.textContent.includes('False'))) b.classList.add('reveal-correct');
    });
  }
  card.classList.add(isCorrect ? 'correct' : 'incorrect');
  const noteEl = document.getElementById('note-' + id);
  if (noteEl) noteEl.style.display = 'block';
  recordAnswer(secId, isCorrect);
}

function checkMC(secId, idx, ans, btn) {
  const q = examData.sections.find(s => s.id === secId).questions[idx];
  const id = `${secId}-${idx}`;
  const card = document.getElementById('card-' + id);
  const isCorrect = ans === q.ans;
  card.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
  btn.classList.add(isCorrect ? 'selected-correct' : 'selected-wrong');
  if (!isCorrect) {
    card.querySelectorAll('.option-btn').forEach(b => {
      if (parseInt(b.dataset.i) === q.ans) b.classList.add('reveal-correct');
    });
  }
  card.classList.add(isCorrect ? 'correct' : 'incorrect');
  const noteEl = document.getElementById('note-' + id);
  if (noteEl) noteEl.style.display = 'block';
  recordAnswer(secId, isCorrect);
}

function recordAnswer(secId, isCorrect) {
  answered++;
  if (isCorrect) correct++;
  sectionProgress[secId].done++;
  document.getElementById(`prog-${secId}`).textContent = `${sectionProgress[secId].done}/${sectionProgress[secId].total}`;
  updateScore();
  checkComplete();
}

function updateScore() {
  document.getElementById('runningCorrect').textContent = correct;
  document.getElementById('runningTotal').textContent = answered;
}

function checkComplete() {
  const totalQs = examData.sections.reduce((a, s) => a + s.questions.length, 0);
  if (answered >= totalQs) {
    document.getElementById('finalCorrect').textContent = correct;
    document.getElementById('finalWrong').textContent = answered - correct;
    document.getElementById('finalTotal').textContent = answered;
    document.getElementById('finalPercent').textContent = Math.round((correct / answered) * 100) + '%';
    document.getElementById('resultsPanel').classList.add('show');
  }
}

render();
</script>
