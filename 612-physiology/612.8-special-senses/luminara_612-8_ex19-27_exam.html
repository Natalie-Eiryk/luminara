<meta charset="UTF-8">

<title>612.8 · Ex 19–27 · Comprehensive Exam · Ms. Luminara</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --void: #03060d;
  --surface: #0a0f1a;
  --panel: #0e1525;
  --panel-hover: #131d30;
  --border: rgba(56,189,248,0.12);
  --border-active: rgba(56,189,248,0.35);
  --primary: #38bdf8;      /* sky blue — neural/electric */
  --warm: #f59e0b;         /* amber — scoring/attention */
  --lumi: #f472b6;         /* luminara pink — essays */
  --purple: #a78bfa;       /* purple — section accents */
  --teal: #2dd4bf;         /* teal — variety */
  --correct: #4ade80;
  --incorrect: #f87171;
  --text: #e2ecf8;
  --mid: #8ba5c2;
  --dim: #3d5169;
  --bright: #f0f7ff;
  /* Section colors */
  --s19: #38bdf8; --s20: #a78bfa; --s21: #2dd4bf;
  --s22: #fb923c; --s23: #f472b6; --s24: #e879f9;
  --s25: #34d399; --s26: #fbbf24; --s27: #60a5fa;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--void);
  color: var(--text);
  font-family: 'Crimson Pro', serif;
  min-height: 100vh;
  overflow-x: hidden;
  font-size: 17px;
  line-height: 1.6;
}

/* NEURAL GRID BACKGROUND */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 80% 60% at 15% 20%, rgba(56,189,248,0.05) 0%, transparent 55%),
    radial-gradient(ellipse 60% 50% at 85% 75%, rgba(167,139,250,0.04) 0%, transparent 55%),
    radial-gradient(ellipse 40% 70% at 50% 40%, rgba(244,114,182,0.025) 0%, transparent 50%);
}

/* ── LAYOUT ── */
.shell { display: flex; min-height: 100vh; position: relative; z-index: 1; }

/* SIDEBAR */
.sidebar {
  width: 230px; flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--border);
  position: sticky; top: 0; height: 100vh;
  overflow-y: auto; overflow-x: hidden;
  display: flex; flex-direction: column;
  padding-bottom: 24px;
}
.sidebar::-webkit-scrollbar { width: 4px; }
.sidebar::-webkit-scrollbar-track { background: transparent; }
.sidebar::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 2px; }

.sidebar-header {
  padding: 20px 18px 14px;
  border-bottom: 1px solid var(--border);
}
.dewey-tag {
  font-family: 'DM Mono', monospace;
  font-size: 9px; letter-spacing: 0.2em;
  color: var(--warm); opacity: 0.8;
  text-transform: uppercase; margin-bottom: 8px;
}
.sidebar-title {
  font-family: 'Playfair Display', serif;
  font-size: 1rem; font-weight: 700;
  color: var(--bright); line-height: 1.2;
}

.score-widget {
  margin: 14px 18px;
  background: rgba(56,189,248,0.06);
  border: 1px solid rgba(56,189,248,0.15);
  border-radius: 10px;
  padding: 12px 14px;
}
.score-label { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.2em; color: var(--mid); text-transform: uppercase; margin-bottom: 6px; }
.score-main { font-family: 'DM Mono', monospace; font-size: 1.6rem; color: var(--primary); line-height: 1; }
.score-denom { font-size: 0.8rem; color: var(--dim); margin-left: 3px; }
.score-bar-wrap { margin-top: 8px; background: rgba(255,255,255,0.05); border-radius: 99px; height: 3px; overflow: hidden; }
.score-bar-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--teal)); border-radius: 99px; transition: width 0.5s ease; width: 0%; }

.nav-sections { flex: 1; padding: 10px 0; }
.nav-section-btn {
  display: flex; align-items: center; gap: 10px;
  width: 100%; padding: 9px 18px;
  background: none; border: none;
  cursor: pointer; transition: background 0.15s;
  text-align: left;
}
.nav-section-btn:hover { background: rgba(255,255,255,0.04); }
.nav-section-btn.active { background: rgba(56,189,248,0.07); }
.nav-dot {
  width: 8px; height: 8px; border-radius: 50%;
  flex-shrink: 0; transition: transform 0.2s;
}
.nav-section-btn.active .nav-dot { transform: scale(1.4); }
.nav-section-btn.done .nav-dot { opacity: 0.5; }
.nav-text { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.05em; color: var(--mid); line-height: 1.3; }
.nav-section-btn.active .nav-text { color: var(--primary); }
.nav-progress { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--dim); margin-left: auto; flex-shrink: 0; }

.sidebar-footer {
  padding: 14px 18px 0;
  border-top: 1px solid var(--border);
}
.results-btn {
  width: 100%; padding: 10px;
  background: rgba(244,114,182,0.1);
  border: 1px solid rgba(244,114,182,0.25);
  border-radius: 8px;
  color: var(--lumi);
  font-family: 'DM Mono', monospace; font-size: 10px;
  letter-spacing: 0.1em; cursor: pointer;
  transition: all 0.2s;
}
.results-btn:hover { background: rgba(244,114,182,0.18); }

/* MAIN */
.main { flex: 1; min-width: 0; padding: 36px 40px 80px; }

/* SECTION HEADER */
.section-panel { display: none; }
.section-panel.active { display: block; animation: fadeUp 0.3s ease; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

.section-head {
  display: flex; align-items: flex-start; gap: 18px;
  margin-bottom: 32px; padding-bottom: 20px;
  border-bottom: 1px solid var(--border);
}
.section-num-badge {
  font-family: 'DM Mono', monospace; font-size: 10px;
  letter-spacing: 0.25em; text-transform: uppercase;
  padding: 4px 12px; border-radius: 99px;
  white-space: nowrap; flex-shrink: 0; margin-top: 6px;
}
.section-meta { flex: 1; }
.section-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.8rem; font-weight: 900;
  color: var(--bright); line-height: 1.1;
  margin-bottom: 6px;
}
.section-sub { font-style: italic; color: var(--mid); font-size: 0.95rem; }
.section-stats {
  display: flex; gap: 16px; margin-top: 10px;
}
.stat-pill {
  font-family: 'DM Mono', monospace; font-size: 9px;
  letter-spacing: 0.15em; color: var(--mid);
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.07);
  padding: 3px 10px; border-radius: 99px;
}

/* QUESTION TYPE DIVIDERS */
.qtype-divider {
  display: flex; align-items: center; gap: 14px;
  margin: 28px 0 16px;
}
.qtype-divider .line { flex: 1; height: 1px; background: var(--border); }
.qtype-label {
  font-family: 'DM Mono', monospace; font-size: 9px;
  letter-spacing: 0.3em; text-transform: uppercase;
  color: var(--dim); white-space: nowrap;
}

/* QUESTION CARDS */
.q-card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 24px 28px;
  margin-bottom: 14px;
  transition: border-color 0.3s;
}
.q-card.answered-correct { border-color: rgba(74,222,128,0.3); }
.q-card.answered-incorrect { border-color: rgba(248,113,113,0.28); }
@keyframes gp { 0%{box-shadow:0 0 0 0 rgba(74,222,128,0.3);}60%{box-shadow:0 0 20px 3px rgba(74,222,128,0.1);}100%{box-shadow:0 0 0 0 rgba(74,222,128,0);} }
.pulse-ok { animation: gp 0.6s ease; }

.q-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.q-num { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.2em; color: var(--primary); opacity: 0.7; text-transform: uppercase; }
.q-pts { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--warm); background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.2); padding: 2px 9px; border-radius: 99px; letter-spacing: 0.08em; }
.q-text { font-size: 1rem; line-height: 1.7; color: var(--bright); margin-bottom: 18px; }
.q-text strong { color: var(--warm); font-weight: 600; }
.q-text em { color: var(--primary); font-style: italic; }

/* T/F */
.tf-row { display: flex; gap: 10px; }
.tf-btn {
  flex: 1; padding: 11px; border-radius: 9px;
  border: 1px solid var(--border);
  background: rgba(255,255,255,0.03);
  color: var(--mid); font-family: 'Crimson Pro', serif;
  font-size: 0.95rem; cursor: pointer; transition: all 0.18s;
}
.tf-btn:hover:not(:disabled) { border-color: var(--primary); color: var(--bright); background: rgba(56,189,248,0.07); }
.tf-btn.sc { border-color: var(--correct); background: rgba(74,222,128,0.12); color: var(--correct); }
.tf-btn.si { border-color: var(--incorrect); background: rgba(248,113,113,0.12); color: var(--incorrect); }
.tf-btn.rv { border-color: var(--correct); background: rgba(74,222,128,0.06); color: var(--correct); }

/* MC */
.mc-group { display: flex; flex-direction: column; gap: 8px; }
.mc-opt {
  display: flex; align-items: flex-start; gap: 11px;
  padding: 11px 14px; border-radius: 9px;
  border: 1px solid var(--border);
  background: rgba(255,255,255,0.03);
  color: var(--mid); font-family: 'Crimson Pro', serif;
  font-size: 0.95rem; cursor: pointer; transition: all 0.18s; text-align: left;
}
.mc-opt:hover:not(:disabled) { border-color: var(--primary); color: var(--bright); background: rgba(56,189,248,0.07); }
.mc-lbl { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--primary); opacity: 0.7; min-width: 14px; margin-top: 4px; flex-shrink: 0; }
.mc-opt.sc { border-color: var(--correct); background: rgba(74,222,128,0.12); color: var(--correct); }
.mc-opt.si { border-color: var(--incorrect); background: rgba(248,113,113,0.12); color: var(--incorrect); }
.mc-opt.rv { border-color: var(--correct); background: rgba(74,222,128,0.06); color: var(--correct); }

/* MATCHING */
.match-table { width: 100%; border-collapse: separate; border-spacing: 0 6px; }
.match-item { font-size: 0.92rem; color: var(--mid); padding-right: 14px; vertical-align: middle; line-height: 1.4; }
.match-sel {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 7px; color: var(--text);
  font-family: 'DM Mono', monospace; font-size: 10px;
  padding: 7px 11px; cursor: pointer; min-width: 200px;
  transition: border-color 0.18s;
}
.match-sel:focus { outline: none; border-color: var(--primary); }
.match-sel.mc2 { border-color: var(--correct); color: var(--correct); }
.match-sel.mi2 { border-color: var(--incorrect); color: var(--incorrect); }
.check-btn {
  margin-top: 16px; padding: 9px 22px;
  background: rgba(56,189,248,0.08); border: 1px solid rgba(56,189,248,0.22);
  border-radius: 7px; color: var(--primary);
  font-family: 'DM Mono', monospace; font-size: 10px;
  letter-spacing: 0.1em; cursor: pointer; transition: all 0.18s;
}
.check-btn:hover { background: rgba(56,189,248,0.15); }
.check-btn:disabled { opacity: 0.3; cursor: default; }

/* FEEDBACK */
.feedback {
  margin-top: 12px; font-size: 0.87rem;
  font-family: 'DM Mono', monospace; display: none;
  padding: 8px 13px; border-radius: 7px; letter-spacing: 0.02em; line-height: 1.5;
}
.feedback.correct { display: block; color: var(--correct); background: rgba(74,222,128,0.07); border-left: 3px solid var(--correct); }
.feedback.incorrect { display: block; color: var(--incorrect); background: rgba(248,113,113,0.07); border-left: 3px solid var(--incorrect); }
.feedback.warn { display: block; color: var(--warm); background: rgba(245,158,11,0.07); border-left: 3px solid var(--warm); }

/* LUMINARA ESSAY */
.essay-card {
  background: linear-gradient(135deg, rgba(244,114,182,0.07), rgba(56,189,248,0.05));
  border: 1px solid rgba(244,114,182,0.2);
  border-radius: 14px; padding: 24px 28px; margin-bottom: 14px;
}
.essay-q { font-size: 1rem; color: var(--bright); margin-bottom: 18px; line-height: 1.7; }
.essay-q strong { color: var(--warm); }
.lumi-label {
  font-family: 'DM Mono', monospace; font-size: 9px;
  letter-spacing: 0.25em; color: var(--lumi); text-transform: uppercase;
  margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
}
.lumi-label::before { content: '✦'; color: var(--warm); font-size: 11px; }
.lumi-body { font-size: 0.96rem; line-height: 1.85; color: var(--text); }
.lumi-body p+p { margin-top: 12px; }
.lumi-body em { color: var(--teal); font-style: italic; }
.lumi-body strong { color: var(--warm); font-weight: 600; }
.lumi-body .h { color: var(--lumi); font-weight: 600; }
.lumi-body .g { color: #60a5fa; font-weight: 600; }
.lumi-body .m { color: var(--purple); }

/* SECTION NAV BUTTONS */
.section-nav {
  display: flex; justify-content: space-between;
  margin-top: 36px; padding-top: 24px;
  border-top: 1px solid var(--border);
}
.snav-btn {
  padding: 10px 24px; border-radius: 9px;
  font-family: 'DM Mono', monospace; font-size: 10px;
  letter-spacing: 0.1em; cursor: pointer; transition: all 0.18s;
  border: 1px solid var(--border);
  background: rgba(255,255,255,0.03); color: var(--mid);
}
.snav-btn:hover { border-color: var(--primary); color: var(--primary); }
.snav-btn.primary { background: rgba(56,189,248,0.1); border-color: rgba(56,189,248,0.3); color: var(--primary); }
.snav-btn:disabled { opacity: 0.25; cursor: default; }

/* RESULTS SCREEN */
#results-screen {
  display: none; animation: fadeUp 0.5s ease;
  max-width: 700px; margin: 0 auto; text-align: center;
  padding: 48px 0;
}
.results-grade { font-family: 'DM Mono', monospace; font-size: 5rem; color: var(--primary); line-height: 1; }
.results-fraction { font-family: 'DM Mono', monospace; font-size: 1.2rem; color: var(--mid); margin-bottom: 8px; }
.results-pct { font-family: 'DM Mono', monospace; font-size: 0.85rem; letter-spacing: 0.2em; color: var(--dim); }
.results-title { font-family: 'Playfair Display', serif; font-size: 2rem; color: var(--bright); margin-bottom: 20px; }
.section-breakdown {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 10px; margin: 28px 0;
}
.breakdown-cell {
  background: var(--panel); border: 1px solid var(--border);
  border-radius: 10px; padding: 14px 10px;
  font-family: 'DM Mono', monospace;
}
.breakdown-cell .bc-score { font-size: 1.4rem; color: var(--primary); margin-bottom: 4px; }
.breakdown-cell .bc-label { font-size: 9px; letter-spacing: 0.1em; color: var(--dim); text-transform: uppercase; }
.results-msg { font-style: italic; color: var(--mid); font-size: 1rem; line-height: 1.8; margin-bottom: 32px; max-width: 520px; margin-left: auto; margin-right: auto; }
.restart-btn {
  padding: 12px 36px; border-radius: 10px;
  background: rgba(244,114,182,0.1); border: 1px solid rgba(244,114,182,0.28);
  color: var(--lumi); font-family: 'DM Mono', monospace; font-size: 11px;
  letter-spacing: 0.15em; cursor: pointer; transition: all 0.2s;
}
.restart-btn:hover { background: rgba(244,114,182,0.2); }

/* NOTE BADGES */
.audit-note {
  font-family: 'DM Mono', monospace; font-size: 10px;
  background: rgba(245,158,11,0.08); border-left: 2px solid var(--warm);
  color: #d4a017; padding: 6px 11px; border-radius: 0 6px 6px 0;
  margin-bottom: 10px; display: inline-block;
}

/* TABLE */
.info-table { width: 100%; border-collapse: collapse; margin: 10px 0; font-size: 0.9rem; }
.info-table th { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--dim); padding: 6px 12px; text-align: left; border-bottom: 1px solid var(--border); }
.info-table td { padding: 7px 12px; color: var(--mid); border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 0.9rem; }
.info-table td:first-child { color: var(--text); }

@media(max-width: 760px) {
  .sidebar { width: 56px; }
  .nav-text, .dewey-tag, .sidebar-title, .score-widget, .sidebar-footer { display: none; }
  .main { padding: 24px 20px 60px; }
  .section-breakdown { grid-template-columns: repeat(2,1fr); }
}

/* ── SCAFFOLDING SYSTEM ── */
.scaffold-toggle {
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  margin-top: 0.75rem;
  padding: 0.4rem 0.8rem;
  background: transparent;
  border: 1px solid var(--warm);
  border-radius: 6px;
  color: var(--warm);
  font-family: 'DM Mono', monospace;
  font-size: 0.7rem;
  letter-spacing: 0.05em;
  cursor: pointer;
  transition: all 0.2s;
}
.scaffold-toggle:hover {
  background: rgba(245,158,11,0.1);
  border-color: var(--warm);
}
.scaffold-toggle .icon { font-size: 0.9rem; }

.scaffold-panel {
  display: none;
  margin-top: 1rem;
  padding: 1rem;
  background: linear-gradient(135deg, rgba(245,158,11,0.05), rgba(167,139,250,0.05));
  border: 1px solid var(--warm);
  border-radius: 10px;
}
.scaffold-panel.show { display: block; animation: fadeUp 0.3s ease; }

.scaffold-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 0.75rem;
  padding-bottom: 0.5rem;
  border-bottom: 1px solid rgba(245,158,11,0.2);
}
.scaffold-title {
  font-family: 'DM Mono', monospace;
  font-size: 0.7rem;
  letter-spacing: 0.1em;
  color: var(--warm);
  display: flex;
  align-items: center;
  gap: 0.4rem;
}
.scaffold-dots {
  display: flex;
  gap: 0.3rem;
}
.scaffold-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: rgba(245,158,11,0.2);
  border: 1px solid var(--warm);
  transition: all 0.3s;
}
.scaffold-dot.complete { background: var(--correct); border-color: var(--correct); }
.scaffold-dot.active { background: var(--warm); transform: scale(1.2); }

.scaffold-question {
  margin-bottom: 1rem;
  padding: 0.75rem;
  background: rgba(255,255,255,0.02);
  border-radius: 8px;
  border-left: 3px solid var(--warm);
}
.scaffold-question:nth-child(1) { border-left-color: #4ade80; }
.scaffold-question:nth-child(2) { border-left-color: #fbbf24; }
.scaffold-question:nth-child(3) { border-left-color: #f472b6; }
.scaffold-level {
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--warm);
  margin-bottom: 0.4rem;
  opacity: 0.8;
}
.scaffold-q-text {
  font-size: 0.9rem;
  color: var(--bright);
  margin-bottom: 0.5rem;
  line-height: 1.5;
}
.scaffold-hint {
  font-family: 'DM Mono', monospace;
  font-size: 0.7rem;
  color: var(--mid);
  font-style: italic;
  margin-bottom: 0.6rem;
  padding-left: 0.5rem;
  border-left: 2px solid rgba(245,158,11,0.3);
}
.scaffold-opts {
  display: flex;
  flex-direction: column;
  gap: 0.4rem;
}
.scaffold-opt {
  padding: 0.5rem 0.75rem;
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--mid);
  font-size: 0.85rem;
  cursor: pointer;
  transition: all 0.15s;
  text-align: left;
}
.scaffold-opt:hover:not(:disabled) {
  border-color: var(--warm);
  color: var(--bright);
  background: rgba(245,158,11,0.07);
}
.scaffold-opt.correct {
  border-color: var(--correct);
  background: rgba(74,222,128,0.12);
  color: var(--correct);
}
.scaffold-opt.incorrect {
  border-color: var(--incorrect);
  background: rgba(248,113,113,0.1);
  color: var(--incorrect);
}
.scaffold-opt.reveal {
  border-color: var(--correct);
  background: rgba(74,222,128,0.06);
  color: var(--correct);
}
.scaffold-opt:disabled { cursor: default; }

.scaffold-feedback {
  margin-top: 0.5rem;
  padding: 0.5rem 0.75rem;
  border-radius: 6px;
  font-size: 0.8rem;
  line-height: 1.5;
  display: none;
}
.scaffold-feedback.show { display: block; animation: fadeUp 0.2s ease; }
.scaffold-feedback.correct {
  background: rgba(74,222,128,0.08);
  border-left: 3px solid var(--correct);
  color: var(--correct);
}

     ans:`Stimulus (tap on patellar tendon) → Receptor: muscle spindle in quadriceps femoris → Afferent: femoral nerve sensory fibers → dorsal root → L2–L4 spinal cord → Integration center: L2–L4 ventral horn (MONOSYNAPTIC — sensory neuron directly synapses on motor neuron) → Efferent: femoral nerve motor fibers → ventral root → Effector: quadriceps femoris contracts → knee extends. Monosynaptic architecture is the engineering solution to a mechanical control problem: the stretch reflex is a continuous negative-feedback loop maintaining muscle length. Every synapse adds latency (~0.5–1 ms each). One synapse = minimum possible delay (~20 ms total). Any additional synapses would reduce the bandwidth of the feedback loop and allow the controlled variable (muscle length) to overshoot before correction could occur. Polysynaptic reflexes (like the withdrawal reflex) can afford extra latency because they are event-driven responses, not continuous controllers.`}

let answered = {};

function init() {
  buildNav();
  buildSections();
  activateSection('s19');
  updateScore();
}

function buildNav() {
  const container = document.getElementById('nav-sections');
  SECTIONS.forEach(s => {
    const qs = s.questions.filter(q => q.type !== 'essay');
    const btn = document.createElement('button');
    btn.className = 'nav-section-btn';
    btn.id = 'nav-' + s.id;
    btn.onclick = () => activateSection(s.id);
    btn.innerHTML = `
      <div class="nav-dot" style="background:${s.color}"></div>
      <div class="nav-text">${s.label}<br>${s.title.split('·')[0].trim()}</div>
      <div class="nav-progress" id="navp-${s.id}">0/${qs.length}</div>`;
    container.appendChild(btn);
  });
}

function buildSections() {
  const main = document.getElementById('main-area');
  SECTIONS.forEach(s => {
    const panel = document.createElement('div');
    panel.className = 'section-panel';
    panel.id = 'panel-' + s.id;
    // Calculate stats
    const qs = s.questions.filter(q=>q.type!=='essay');
    const essays = s.questions.filter(q=>q.type==='essay');
    const pts = s.questions.reduce((a,q)=>a+q.pts,0);
    const scored = qs.reduce((a,q)=>a+q.pts,0);

    let html = `
      <div class="section-head">
        <div class="section-num-badge" style="color:${s.color};background:${s.color}18;border:1px solid ${s.color}30">
          Dewey ${s.dewey}
        </div>
        <div class="section-meta">
          <div class="section-title">${s.title}</div>
          <div class="section-sub">${s.sub}</div>
          <div class="section-stats">
            <span class="stat-pill">${qs.length} scored questions</span>
            <span class="stat-pill">${essays.length} essay panels</span>
            <span class="stat-pill">${pts} pts total</span>
          </div>
        </div>
      </div>`;

    // Add section images (click to load)
    html += renderSectionImages(s.id);

    // Group by type
    const groups = [
      {key:'match', label:'Matching'},
      {key:'tf', label:'True / False'},
      {key:'mc', label:'Multiple Choice'},
      {key:'essay', label:'Short Answer — Ms. Luminara'}
    ];

    groups.forEach(g => {
      const gqs = s.questions.filter(q=>q.type===g.key);
      if (!gqs.length) return;
      html += `<div class="qtype-divider"><div class="line"></div><div class="qtype-label">${g.label}</div><div class="line"></div></div>`;
      gqs.forEach(q => {
        html += buildQuestion(q, s.color);
      });
    });

    // Section navigation
    const sIdx = SECTIONS.findIndex(x=>x.id===s.id);
    const prev = sIdx > 0 ? SECTIONS[sIdx-1] : null;
    const next = sIdx < SECTIONS.length-1 ? SECTIONS[sIdx+1] : null;
    html += `<div class="section-nav">
      <button class="snav-btn${prev?' primary':''}" ${prev?`onclick="activateSection('${prev.id}')"`:' disabled'}>
        ${prev?'← '+prev.label:'← Start'}
      </button>
      <button class="snav-btn primary" onclick="showResults()">VIEW RESULTS ✦</button>
      <button class="snav-btn${next?' primary':''}" ${next?`onclick="activateSection('${next.id}')"`:' disabled'}>
        ${next?next.label+' →':'Complete ✓'}
      </button>
    </div>`;

    panel.innerHTML = html;
    main.appendChild(panel);
  });
}

function buildQuestion(q, color) {
  if (q.type === 'tf') return buildTF(q, color);
  if (q.type === 'mc') return buildMC(q, color);
  if (q.type === 'match') return buildMatch(q, color);
  if (q.type === 'essay') return buildEssay(q);
  return '';
}

function buildTF(q, color) {
  const note = q.note ? `<div class="audit-note">📝 ${q.note}</div>` : '';
  const flagged = flaggedQuestions.has(q.id);
  return `<div class="q-card" id="card-${q.id}">
    <div class="q-meta"><div class="q-num">Question ${q.id}</div><div class="q-pts">${q.pts} PT</div><button class="flag-btn${flagged ? ' flagged' : ''}" onclick="toggleFlag('${q.id}')">${flagged ? '<span class="flag-icon">🚩</span> Flagged' : '<span class="flag-icon">⚑</span> Flag'}</button></div>
    ${note}
    <div class="q-text">${highlightToughWords(q.q)}</div>
    <div class="tf-row">
      <button class="tf-btn" onclick="answerTF('${q.id}',true)">True</button>
      <button class="tf-btn" onclick="answerTF('${q.id}',false)">False</button>
    </div>
    <div class="feedback" id="fb-${q.id}"></div>
  </div>`;
}

function buildMC(q, color) {
  let opts = q.opts.map((o,i) => `<button class="mc-opt" onclick="answerMC('${q.id}',${i})"><span class="mc-lbl">${'ABCD'[i]}</span>${highlightToughWords(o)}</button>`).join('');
  const flagged = flaggedQuestions.has(q.id);
  return `<div class="q-card" id="card-${q.id}">
    <div class="q-meta"><div class="q-num">Question ${q.id}</div><div class="q-pts">${q.pts} PT</div><button class="flag-btn${flagged ? ' flagged' : ''}" onclick="toggleFlag('${q.id}')">${flagged ? '<span class="flag-icon">🚩</span> Flagged' : '<span class="flag-icon">⚑</span> Flag'}</button></div>
    <div class="q-text">${highlightToughWords(q.q)}</div>
    <div class="mc-group">${opts}</div>
    <div class="feedback" id="fb-${q.id}"></div>
  </div>`;
}

function buildMatch(q, color) {
  let rows = q.items.map((item,i) => {
    let options = q.opts.map((o,j)=>`<option value="${j}">${o}</option>`).join('');
    return `<tr><td class="match-item">${highlightToughWords(item)}</td><td><select class="match-sel" data-ans="${q.ans[i]}" data-qid="${q.id}" data-idx="${i}"><option value="">— select —</option>${options}</select></td></tr>`;
  }).join('');
  const flagged = flaggedQuestions.has(q.id);
  return `<div class="q-card" id="card-${q.id}">
    <div class="q-meta"><div class="q-num">Question ${q.id}</div><div class="q-pts">${q.pts} PT</div><button class="flag-btn${flagged ? ' flagged' : ''}" onclick="toggleFlag('${q.id}')">${flagged ? '<span class="flag-icon">🚩</span> Flagged' : '<span class="flag-icon">⚑</span> Flag'}</button></div>
    <div class="q-text">${highlightToughWords(q.q)}</div>
    <table class="match-table">${rows}</table>
    <button class="check-btn" id="chk-${q.id}" onclick="checkMatch('${q.id}')">CHECK ANSWERS</button>
    <div class="feedback" id="fb-${q.id}"></div>
  </div>`;
}

function buildEssay(q) {
  const flagged = flaggedQuestions.has(q.id);
  return `<div class="essay-card" id="card-${q.id}" data-qid="${q.id}">
    <div class="q-meta"><div class="q-num">Essay — ${q.id}</div><div class="q-pts">${q.pts} PT</div><button class="flag-btn${flagged ? ' flagged' : ''}" onclick="toggleFlag('${q.id}')">${flagged ? '<span class="flag-icon">🚩</span> Flagged' : '<span class="flag-icon">⚑</span> Flag'}</button></div>
    <div class="essay-q">${highlightToughWords(q.q)}</div>
    <div class="lumi-label">Ms. Luminara — Model Answer</div>
    <div class="lumi-body">${highlightToughWords(formatAnswer(q.ans))}</div>
  </div>`;
}

function formatAnswer(text) {
  // Bold key terms, wrap in paragraphs
  return text.split('. ').reduce((acc, sent, i, arr) => {
    if (sent.length > 0) acc += (i && acc.length > 300 ? '</p><p>' : '') + sent + (i < arr.length-1 ? '. ' : '');
    return acc;
  }, '<p>') + '</p>';
}

/* ═══════════════════════════════════════════
   ANSWER HANDLERS
═══════════════════════════════════════════ */
function answerTF(qid, chosen) {
  if (answered[qid] !== undefined) return;
  const q = findQ(qid);
  const correct = q.ans;
  const win = chosen === correct;
  const card = document.getElementById('card-'+qid);
  const btns = card.querySelectorAll('.tf-btn');
  btns.forEach(b => b.disabled = true);
  btns[chosen ? 0 : 1].classList.add(win ? 'sc' : 'si');
  if (!win) btns[correct ? 0 : 1].classList.add('rv');
  card.classList.add(win ? 'answered-correct' : 'answered-incorrect');
  if (win) { card.classList.add('pulse-ok'); totalEarned += q.pts; }
  totalPossible += q.pts;
  answered[qid] = win;
  updateScore(); updateNavProgress(qid);
  const fb = document.getElementById('fb-'+qid);
  fb.className = 'feedback ' + (win ? 'correct' : 'incorrect');
  fb.textContent = win ? '✓ Correct.' : '✗ Incorrect — answer is ' + (correct ? 'True' : 'False') + '.';
}

function answerMC(qid, chosen) {
  if (answered[qid] !== undefined) return;
  const q = findQ(qid);
  const correct = q.ans;
  const win = chosen === correct;
  const card = document.getElementById('card-'+qid);
  const btns = card.querySelectorAll('.mc-opt');
  btns.forEach(b => b.disabled = true);
  btns[chosen].classList.add(win ? 'sc' : 'si');
  if (!win) btns[correct].classList.add('rv');
  card.classList.add(win ? 'answered-correct' : 'answered-incorrect');
  if (win) { card.classList.add('pulse-ok'); totalEarned += q.pts; }
  totalPossible += q.pts;
  answered[qid] = win;
  updateScore(); updateNavProgress(qid);
  const fb = document.getElementById('fb-'+qid);
  fb.className = 'feedback ' + (win ? 'correct' : 'incorrect');
  fb.textContent = win ? '✓ Correct.' : '✗ Incorrect — correct answer is ' + 'ABCD'[correct] + '.';
}

function checkMatch(qid) {
  if (answered[qid] !== undefined) return;
  const card = document.getElementById('card-'+qid);
  const sels = card.querySelectorAll('.match-sel');
  let filled = true;
  sels.forEach(s => { if (!s.value) filled = false; });
  if (!filled) {
    const fb = document.getElementById('fb-'+qid); fb.className = 'feedback warn'; fb.textContent = '⚠ Please answer all items first.'; return;
  }
  let correct = 0;
  sels.forEach(s => {
    s.disabled = true;
    if (parseInt(s.value) === parseInt(s.dataset.ans)) { s.classList.add('mc2'); correct++; }
    else s.classList.add('mi2');
  });
  document.getElementById('chk-'+qid).disabled = true;
  const win = correct === sels.length;
  const q = findQ(qid);
  card.classList.add(win ? 'answered-correct' : 'answered-incorrect');
  if (win) { card.classList.add('pulse-ok'); totalEarned += q.pts; }
  totalPossible += q.pts;
  answered[qid] = win;
  updateScore(); updateNavProgress(qid);
  const fb = document.getElementById('fb-'+qid);
  fb.className = 'feedback ' + (win ? 'correct' : 'incorrect');
  fb.textContent = win ? '✓ All ' + sels.length + ' correct!' : '✗ ' + correct + '/' + sels.length + ' correct. Incorrect items highlighted.';
}

/* ═══════════════════════════════════════════
   NAVIGATION
═══════════════════════════════════════════ */
function activateSection(id) {
  document.querySelectorAll('.section-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-section-btn').forEach(b => b.classList.remove('active'));
  const panel = document.getElementById('panel-'+id);
  if (panel) { panel.classList.add('active'); }
  const nav = document.getElementById('nav-'+id);
  if (nav) nav.classList.add('active');
  document.getElementById('results-screen').style.display = 'none';
  currentSection = id;
  window.scrollTo({top:0, behavior:'smooth'});
}

function updateNavProgress(qid) {
  // Find which section this q belongs to
  for (const s of SECTIONS) {
    const found = s.questions.find(q => q.id === qid && q.type !== 'essay');
    if (found) {
      const total = s.questions.filter(q=>q.type!=='essay').length;
      const done = s.questions.filter(q=>q.type!=='essay' && answered[q.id] !== undefined).length;
      const el = document.getElementById('navp-'+s.id);
      if (el) el.textContent = done+'/'+total;
      if (done === total) {
        const navBtn = document.getElementById('nav-'+s.id);
        if (navBtn) navBtn.classList.add('done');
      }
      break;
    }
  }
}

/* ═══════════════════════════════════════════
   SCORE
═══════════════════════════════════════════ */
function updateScore() {
  document.getElementById('sb-score').textContent = totalEarned;
  document.getElementById('sb-denom').textContent = ' / ' + totalPossible + ' pts';
  const pct = totalPossible > 0 ? (totalEarned/totalPossible)*100 : 0;
  document.getElementById('sb-fill').style.width = pct + '%';
}

function findQ(id) {
  for (const s of SECTIONS) { const q = s.questions.find(q=>q.id===id); if (q) return q; }
  return null;
}

/* ═══════════════════════════════════════════
   RESULTS
═══════════════════════════════════════════ */
function showResults() {
  document.querySelectorAll('.section-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-section-btn').forEach(b => b.classList.remove('active'));
  const rs = document.getElementById('results-screen');
  rs.style.display = 'block';
  const pct = totalPossible > 0 ? Math.round(totalEarned/totalPossible*100) : 0;
  document.getElementById('res-grade').textContent = pct + '%';
  document.getElementById('res-frac').textContent = totalEarned + ' / ' + totalPossible;
  document.getElementById('res-pct').textContent = 'Scored questions only · Essay panels shown for review';
  // Breakdown
  const grid = document.getElementById('breakdown-grid');
  grid.innerHTML = '';
  SECTIONS.forEach(s => {
    const qs = s.questions.filter(q=>q.type!=='essay');
    const earned = qs.reduce((a,q)=>a+(answered[q.id]?q.pts:0), 0);
    const total = qs.reduce((a,q)=>a+q.pts, 0);
    const cell = document.createElement('div');
    cell.className = 'breakdown-cell';
    cell.innerHTML = `<div class="bc-score" style="color:${s.color}">${earned}/${total}</div><div class="bc-label">${s.label}</div>`;
    grid.appendChild(cell);
  });
  const msgs = [
    [90,'The cascade is yours. Every axis, every receptor, every feedback loop. The bus can go anywhere now.'],
    [75,'Solid architecture. A few mechanisms need one more ride through — pick the sections in amber and go back in.'],
    [60,'The big picture is there. Let\'s ride the feedback loops one more time. That\'s where this material lives.'],
    [0,'Hormones are gradients with addresses. Nerve fibers are logic gates. Seatbelts — we\'re going back in.']
  ];
  document.getElementById('res-msg').textContent = msgs.find(([t])=>pct>=t)[1];
  window.scrollTo({top:0,behavior:'smooth'});
}

function restart() {
  totalEarned = 0; totalPossible = 0; answered = {};
  document.getElementById('results-screen').style.display = 'none';
  // Reset all cards
  document.querySelectorAll('.q-card').forEach(card => {
    card.className = 'q-card';
    card.querySelectorAll('.tf-btn, .mc-opt').forEach(b => { b.disabled=false; b.classList.remove('sc','si','rv'); });
    card.querySelectorAll('.match-sel').forEach(s => { s.disabled=false; s.value=''; s.classList.remove('mc2','mi2'); });
    card.querySelectorAll('.check-btn').forEach(b => b.disabled=false);
    card.querySelectorAll('.feedback').forEach(f => { f.className='feedback'; f.textContent=''; });
  });
  // Reset nav progress
  SECTIONS.forEach(s => {
    const el = document.getElementById('navp-'+s.id);
    const total = s.questions.filter(q=>q.type!=='essay').length;
    if (el) el.textContent = '0/'+total;
    const nb = document.getElementById('nav-'+s.id);
    if (nb) nb.classList.remove('done');
  });
  updateScore();
  activateSection('s19');
}

/* ═══════════════════════════════════════════
   FLAGGED QUESTIONS TRACKING
═══════════════════════════════════════════ */
let flaggedQuestions = new Set();

function toggleFlag(qid) {
  if (flaggedQuestions.has(qid)) {
    flaggedQuestions.delete(qid);
  } else {
    flaggedQuestions.add(qid);
  }
  const btn = document.querySelector(`#card-${qid} .flag-btn, .essay-card[data-qid="${qid}"] .flag-btn`);
  if (btn) {
    btn.classList.toggle('flagged', flaggedQuestions.has(qid));
    btn.innerHTML = flaggedQuestions.has(qid)
      ? '<span class="flag-icon">🚩</span> Flagged'
      : '<span class="flag-icon">⚑</span> Flag';
  }
}

/* ═══════════════════════════════════════════
   TOUGH WORD HIGHLIGHTING
═══════════════════════════════════════════ */
function highlightToughWords(text) {
  if (!text) return '';
  let result = text;

  // Sort by length descending to match longer phrases first
  const sortedWords = Object.keys(toughWords).sort((a, b) => b.length - a.length);

  for (const word of sortedWords) {
    const regex = new RegExp(`\\b(${word})\\b`, 'gi');
    result = result.replace(regex, (match) => {
      const definition = toughWords[word.toLowerCase()];
      return `<span class="tough-word" title="${definition}">${match}<span class="tough-word-tooltip">${definition}</span></span>`;
    });
  }
  return result;
}

  const images = questionImages[sectionId];
  if (!images || images.length === 0) return '';

  const basePath = '../assets/diagrams';

  return `
    <div class="section-images">
      <div class="section-images-toggle" onclick="toggleSectionImages('${sectionId}')">
        <span class="toggle-icon">📷</span>
        <span class="toggle-text">Reference Images (${images.length})</span>
        <span class="toggle-arrow" id="arrow-${sectionId}">▼</span>
      </div>
      <div class="section-images-content" id="images-${sectionId}" style="display: none;">
        <div class="q-images">
          ${images.map(img => `
            <div class="q-image-item" onclick="showImageModal('${img.file}', '${img.title}')">
              <img src="${basePath}/${img.file}"
                   alt="${img.title}"
                   class="q-image-thumb"
                   onerror="this.parentElement.style.display='none'"
                   loading="lazy">
              <div class="q-image-caption">${img.title}</div>
            </div>
          `).join('')}
        </div>
      </div>
    </div>
  `;
}

function toggleSectionImages(sectionId) {
  const content = document.getElementById('images-' + sectionId);
  const arrow = document.getElementById('arrow-' + sectionId);
  if (content.style.display === 'none') {
    content.style.display = 'block';
    arrow.textContent = '▲';
  } else {
    content.style.display = 'none';
    arrow.textContent = '▼';
  }
}

function showImageModal(file, title) {
  const basePath = '../assets/diagrams';
  const modal = document.createElement('div');
  modal.className = 'image-modal-overlay';
  modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
  modal.innerHTML = `
    <div class="image-modal-content">
      <button class="image-modal-close" onclick="this.parentElement.parentElement.remove()">✕</button>
      <div class="image-modal-title">${title}</div>
      <img src="${basePath}/${file}" alt="${title}" class="image-modal-img">
    </div>
  `;
  document.body.appendChild(modal);
}

function renderScaffoldToggle(scaffoldId) {
  const data = scaffoldData[scaffoldId];
  if (!data) return '';

  // Render ALL scaffold questions at once
  const allQuestions = data.scaffolds.map((s, i) => {
    const opts = s.opts.map((opt, j) =>
      `<button class="scaffold-opt" onclick="answerScaffold('${scaffoldId}', ${i}, ${j})">${opt}</button>`
    ).join('');
    const levelLabel = i === 0 ? '🌱 Easy' : i === 1 ? '🌿 Intermediate' : '🌳 Building Block';
    return `
      <div class="scaffold-question" id="scaffold-q-${scaffoldId}-${i}">
        <div class="scaffold-level">${levelLabel}</div>
        <div class="scaffold-q-text">${s.q}</div>
        <div class="scaffold-hint">💡 ${s.hint}</div>
        <div class="scaffold-opts" id="scaffold-opts-${scaffoldId}-${i}">${opts}</div>
        <div class="scaffold-feedback" id="scaffold-fb-${scaffoldId}-${i}"></div>
      </div>
    `;
  }).join('');

  return `
    <button class="scaffold-toggle" onclick="toggleScaffold('${scaffoldId}')">
      <span class="icon">🪜</span> Need Help? Build Understanding
    </button>
    <div class="scaffold-panel" id="scaffold-panel-${scaffoldId}">
      <div class="scaffold-header">
        <span class="scaffold-title"><span class="icon">🪜</span> Ms. Luminara's Scaffolding</span>
      </div>
      <div id="scaffold-content-${scaffoldId}">
        ${allQuestions}
      </div>
    </div>
  `;
}

function renderScaffoldQuestion(scaffoldId, index) {
  const data = scaffoldData[scaffoldId];
  if (!data || index >= data.scaffolds.length) return '';

  const s = data.scaffolds[index];
  const opts = s.opts.map((opt, i) =>
    `<button class="scaffold-opt" onclick="answerScaffold('${scaffoldId}', ${index}, ${i})">${opt}</button>`
  ).join('');

  return `
    <div class="scaffold-question" id="scaffold-q-${scaffoldId}-${index}">
      <div class="scaffold-q-text">${index + 1}. ${s.q}</div>
      <div class="scaffold-hint">💡 ${s.hint}</div>
      <div class="scaffold-opts" id="scaffold-opts-${scaffoldId}-${index}">${opts}</div>
      <div class="scaffold-feedback" id="scaffold-fb-${scaffoldId}-${index}"></div>
    </div>
  `;
}

function toggleScaffold(scaffoldId) {
  const panel = document.getElementById('scaffold-panel-' + scaffoldId);
  if (!panel) return;

  const isOpening = !panel.classList.contains('show');
  panel.classList.toggle('show');

  // Track stats
  if (isOpening) {
    scaffoldStats.opened[scaffoldId] = (scaffoldStats.opened[scaffoldId] || 0) + 1;
    if (!scaffoldState[scaffoldId]) {
      scaffoldState[scaffoldId] = { current: 0, completed: false, startTime: Date.now() };
    } else {
      scaffoldState[scaffoldId].startTime = Date.now();
    }
  } else if (scaffoldState[scaffoldId] && scaffoldState[scaffoldId].startTime) {
    // Track time spent
    const elapsed = Date.now() - scaffoldState[scaffoldId].startTime;
    scaffoldStats.timeSpent[scaffoldId] = (scaffoldStats.timeSpent[scaffoldId] || 0) + elapsed;
  }
}

function answerScaffold(scaffoldId, index, answer) {
  const data = scaffoldData[scaffoldId];
  if (!data) return;

  const s = data.scaffolds[index];
  const correct = answer === s.ans;
  const optsContainer = document.getElementById(`scaffold-opts-${scaffoldId}-${index}`);
  const opts = optsContainer.querySelectorAll('.scaffold-opt');
  const fb = document.getElementById(`scaffold-fb-${scaffoldId}-${index}`);
  const qCard = document.getElementById(`scaffold-q-${scaffoldId}-${index}`);

  // Track attempts
  const attemptKey = `${scaffoldId}-${index}`;
  if (!scaffoldStats.questionAttempts[attemptKey]) {
    scaffoldStats.questionAttempts[attemptKey] = { correct: 0, incorrect: 0 };
  }
  if (correct) {
    scaffoldStats.questionAttempts[attemptKey].correct++;
  } else {
    scaffoldStats.questionAttempts[attemptKey].incorrect++;
  }

  // Disable all options and show result
  opts.forEach((opt, i) => {
    opt.disabled = true;
    if (i === answer) opt.classList.add(correct ? 'correct' : 'incorrect');
    if (!correct && i === s.ans) opt.classList.add('reveal');
  });

  // Show feedback
  fb.textContent = correct ? `✓ ${s.explain}` : `✗ ${s.explain}`;
  fb.className = `scaffold-feedback show ${correct ? 'correct' : 'incorrect'}`;

  // Mark question card as answered
  if (qCard) qCard.classList.add(correct ? 'answered-correct' : 'answered-incorrect');

  // Track scaffold state
  scaffoldState[scaffoldId] = scaffoldState[scaffoldId] || { answered: [] };
  scaffoldState[scaffoldId].answered[index] = correct;

  // Check if all answered - show summary
  const allAnswered = data.scaffolds.every((_, i) => scaffoldState[scaffoldId].answered[i] !== undefined);
  if (allAnswered && !scaffoldState[scaffoldId].summaryShown) {
    scaffoldState[scaffoldId].summaryShown = true;
    scaffoldState[scaffoldId].completed = true;
    scaffoldStats.completed[scaffoldId] = (scaffoldStats.completed[scaffoldId] || 0) + 1;

    setTimeout(() => {
      const content = document.getElementById(`scaffold-content-${scaffoldId}`);
      const summaryHtml = `
        <div class="scaffold-summary">
          <div class="scaffold-summary-title">✓ Key Takeaways</div>
          <ul class="scaffold-summary-list">
            ${data.summary.map(s => `<li>${s}</li>`).join('')}
          </ul>
        </div>
      `;
      content.innerHTML += summaryHtml;
    }, 500);
  }
}

// Function to get stats for export
function getScaffoldStats() {
  return {
    ...scaffoldStats,
    sessionDuration: Date.now() - scaffoldStats.sessionStart,
    exportedAt: new Date().toISOString()
  };
}

// Override buildTF to include scaffolding
const originalBuildTF = buildTF;
buildTF = function(q, color) {
  const scaffoldId = questionScaffolds[q.id];
  const note = q.note ? `<div class="audit-note">📝 ${q.note}</div>` : '';
  const scaffoldHtml = scaffoldId ? renderScaffoldToggle(scaffoldId) : '';

  return `<div class="q-card" id="card-${q.id}">
    <div class="q-meta"><div class="q-num">Question ${q.id}</div><div class="q-pts">${q.pts} PT</div></div>
    ${note}
    <div class="q-text">${q.q}</div>
    <div class="tf-row">
      <button class="tf-btn" onclick="answerTF('${q.id}',true)">True</button>
      <button class="tf-btn" onclick="answerTF('${q.id}',false)">False</button>
    </div>
    <div class="feedback" id="fb-${q.id}"></div>
    ${scaffoldHtml}
  </div>`;
};

// Override buildMC to include scaffolding
const originalBuildMC = buildMC;
buildMC = function(q, color) {
  const scaffoldId = questionScaffolds[q.id];
  let opts = q.opts.map((o,i) => `<button class="mc-opt" onclick="answerMC('${q.id}',${i})"><span class="mc-lbl">${'ABCD'[i]}</span>${o}</button>`).join('');
  const scaffoldHtml = scaffoldId ? renderScaffoldToggle(scaffoldId) : '';

  return `<div class="q-card" id="card-${q.id}">
    <div class="q-meta"><div class="q-num">Question ${q.id}</div><div class="q-pts">${q.pts} PT</div></div>
    <div class="q-text">${q.q}</div>
    <div class="mc-group">${opts}</div>
    <div class="feedback" id="fb-${q.id}"></div>
    ${scaffoldHtml}
  </div>`;
};

// Override buildMatch to include scaffolding
const originalBuildMatch = buildMatch;
buildMatch = function(q, color) {
  const scaffoldId = questionScaffolds[q.id];
  const scaffoldHtml = scaffoldId ? renderScaffoldToggle(scaffoldId) : '';
  let rows = q.items.map((item,i) => {
    let options = q.opts.map((o,j)=>`<option value="${j}">${o}</option>`).join('');
    return `<tr><td class="match-item">${item}</td><td><select class="match-sel" data-ans="${q.ans[i]}" data-qid="${q.id}" data-idx="${i}"><option value="">— select —</option>${options}</select></td></tr>`;
  }).join('');
  return `<div class="q-card" id="card-${q.id}">
    <div class="q-meta"><div class="q-num">Question ${q.id}</div><div class="q-pts">${q.pts} PT</div></div>
    <div class="q-text">${q.q}</div>
    <table class="match-table">${rows}</table>
    <button class="check-btn" id="chk-${q.id}" onclick="checkMatch('${q.id}')">CHECK ANSWERS</button>
    <div class="feedback" id="fb-${q.id}"></div>
    ${scaffoldHtml}
  </div>`;
};

// Override buildEssay to include scaffolding
const originalBuildEssay = buildEssay;
buildEssay = function(q) {
  const scaffoldId = questionScaffolds[q.id];
  const scaffoldHtml = scaffoldId ? renderScaffoldToggle(scaffoldId) : '';
  return `<div class="essay-card" id="card-${q.id}">
    <div class="q-meta"><div class="q-num">Essay — ${q.id}</div><div class="q-pts">${q.pts} PT</div></div>
    <div class="essay-q">${q.q}</div>
    ${scaffoldHtml}
    <div class="lumi-label">Ms. Luminara — Model Answer</div>
    <div class="lumi-body">${formatAnswer(q.ans)}</div>
  </div>`;
};
