     <switch><text transform="translate(    0,  150)" x="0" y="0.7ex" id="trsvg47-de" systemLanguage="de"><tspan id="trsvg19-de">Winkel zur Fovea</tspan></text><text transform="translate(    0,  150)" x="0" y="0.7ex" id="trsvg47-id" systemLanguage="id"><tspan id="trsvg19-id">Sudut dari fovea</tspan></text><text transform="translate(    0,  150)" x="0" y="0.7ex" id="trsvg47-fr" systemLanguage="fr"><tspan id="trsvg19-fr">Angle à la fovea</tspan></text><text transform="translate(    0,  150)" x="0" y="0.7ex" id="trsvg47"><tspan id="trsvg19">Angle from fovea</tspan></text></switch>
     <switch><text transform="translate(-1120,-1000) rotate(-90)" x="0" y="0.7ex" id="trsvg48-de" systemLanguage="de"><tspan id="trsvg20-de">Zahl der Rezeptoren pro mm²</tspan></text><text transform="translate(-1120,-1000) rotate(-90)" x="0" y="0.7ex" id="trsvg48-id" systemLanguage="id"><tspan id="trsvg20-id">Jumlah reseptor per mm²</tspan></text><text transform="translate(-1120,-1000) rotate(-90)" x="0" y="0.7ex" id="trsvg48-fr" systemLanguage="fr"><tspan id="trsvg20-fr">nombre de récepteur par mm²</tspan></text><text transform="translate(-1120,-1000) rotate(-90)" x="0" y="0.7ex" id="trsvg48"><tspan id="trsvg20">Number of receptors per mm²</tspan></text></switch>
     <switch><text transform="translate( -200, -450)" x="0" y="0.7ex" id="trsvg49-id" systemLanguage="id"><tspan id="trsvg21-id">Fovea</tspan></text><text transform="translate( -200, -450)" x="0" y="0.7ex" id="trsvg49"><tspan id="trsvg21">Fovea</tspan></text></switch>
     <switch><text transform="translate(  490, -450)" x="0" y="0.7ex" id="trsvg50-de" systemLanguage="de"><tspan id="trsvg22-de">Blinder Fleck</tspan></text><text transform="translate(  490, -450)" x="0" y="0.7ex" id="trsvg50-id" systemLanguage="id"><tspan id="trsvg22-id">Titik buta</tspan></text><text transform="translate(  490, -450)" x="0" y="0.7ex" id="trsvg50-fr" systemLanguage="fr"><tspan id="trsvg22-fr">Tache aveugle</tspan></text><text transform="translate(  490, -450)" x="0" y="0.7ex" id="trsvg50"><tspan id="trsvg22">Blind spot</tspan></text></switch>
     <switch><text transform="translate( -550,-1740)" x="0" y="0.7ex" id="trsvg51-de" systemLanguage="de"><tspan id="trsvg23-de">(Schläfe)</tspan><tspan x="0.5ex" dy="2ex" id="trsvg24-de"> </tspan></text><text transform="translate( -550,-1740)" x="0" y="0.7ex" id="trsvg51-id" systemLanguage="id"><tspan id="trsvg23-id">sisi</tspan><tspan x="0.5ex" dy="2ex" id="trsvg24-id">pelipis</tspan></text><text transform="translate( -550,-1740)" x="0" y="0.7ex" id="trsvg51-fr" systemLanguage="fr"><tspan id="trsvg23-fr">(côté</tspan><tspan x="0.5ex" dy="2ex" id="trsvg24-fr">temporal)</tspan></text><text transform="translate( -550,-1740)" x="0" y="0.7ex" id="trsvg51"><tspan id="trsvg23">(temple</tspan><tspan x="0.5ex" dy="2ex" id="trsvg24">side)</tspan></text></switch>
     <switch><text transform="translate(  650,-1740)" x="0" y="0.7ex" id="trsvg52-de" systemLanguage="de"><tspan id="trsvg25-de">(Nase)</tspan><tspan x="0.5ex" dy="2ex" id="trsvg26-de"> </tspan></text><text transform="translate(  650,-1740)" x="0" y="0.7ex" id="trsvg52-id" systemLanguage="id"><tspan id="trsvg25-id">sisi</tspan><tspan x="0.5ex" dy="2ex" id="trsvg26-id">hidung</tspan></text><text transform="translate(  650,-1740)" x="0" y="0.7ex" id="trsvg52-fr" systemLanguage="fr"><tspan id="trsvg25-fr">(côté</tspan><tspan x="0.5ex" dy="2ex" id="trsvg26-fr">nasal)</tspan></text><text transform="translate(  650,-1740)" x="0" y="0.7ex" id="trsvg52"><tspan id="trsvg25">(nose</tspan><tspan x="0.5ex" dy="2ex" id="trsvg26">side)</tspan></text></switch>
