    <switch><text transform="translate(650,-150)" x="0" y="0.7ex" stroke="none" id="trsvg54-de" systemLanguage="de"><tspan id="trsvg28-de">Zapfen</tspan></text><text transform="translate(650,-150)" x="0" y="0.7ex" stroke="none" id="trsvg54-id" systemLanguage="id"><tspan id="trsvg28-id">Kerucut</tspan></text><text transform="translate(650,-150)" x="0" y="0.7ex" stroke="none" id="trsvg54-fr" systemLanguage="fr"><tspan id="trsvg28-fr">Cônes</tspan></text><text transform="translate(650,-150)" x="0" y="0.7ex" stroke="none" id="trsvg54"><tspan id="trsvg28">Cones</tspan></text></switch>
