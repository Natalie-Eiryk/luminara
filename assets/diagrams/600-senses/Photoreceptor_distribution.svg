    <switch><text transform="translate(650,-750)" x="0" y="0.7ex" stroke="none" id="trsvg53-de" systemLanguage="de"><tspan id="trsvg27-de">Stäbchen</tspan></text><text transform="translate(650,-750)" x="0" y="0.7ex" stroke="none" id="trsvg53-id" systemLanguage="id"><tspan id="trsvg27-id">Batang</tspan></text><text transform="translate(650,-750)" x="0" y="0.7ex" stroke="none" id="trsvg53-fr" systemLanguage="fr"><tspan id="trsvg27-fr">Bâtonnets</tspan></text><text transform="translate(650,-750)" x="0" y="0.7ex" stroke="none" id="trsvg53"><tspan id="trsvg27">Rods</tspan></text></switch>
