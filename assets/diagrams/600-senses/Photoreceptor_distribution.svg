     <use xlink:href="#grid_y_5" transform="translate(0,-1500)"/>
     <use xlink:href="#grid_y_5" transform="translate(0,-1000)"/>
     <use xlink:href="#grid_y_5" transform="translate(0,-500)"/>
     <use xlink:href="#grid_x_5" transform="translate(-1000,0)"/>
     <use xlink:href="#grid_x_5" transform="translate(-500,0)"/>
     <use xlink:href="#grid_x_5" transform="translate(0,0)"/>
     <use xlink:href="#grid_x_5" transform="translate(500,0)"/>
     <use xlink:href="#frame"/>
     <path d="M -200,-410 L 5,-50 M  350,-410 L 160,-50" stroke-width="2"/>
    </g>
    <g fill="#000000">
     <switch><text transform="translate( -880,-1800)" x="0" y="0.7ex" id="trsvg29-id" systemLanguage="id"><tspan id="trsvg1-id">180 000</tspan></text><text transform="translate( -880,-1800)" x="0" y="0.7ex" id="trsvg29"><tspan id="trsvg1">180 000</tspan></text></switch>
     <switch><text transform="translate( -880,-1600)" x="0" y="0.7ex" id="trsvg30-id" systemLanguage="id"><tspan id="trsvg2-id">160 000</tspan></text><text transform="translate( -880,-1600)" x="0" y="0.7ex" id="trsvg30"><tspan id="trsvg2">160 000</tspan></text></switch>
     <switch><text transform="translate( -880,-1400)" x="0" y="0.7ex" id="trsvg31-id" systemLanguage="id"><tspan id="trsvg3-id">140 000</tspan></text><text transform="translate( -880,-1400)" x="0" y="0.7ex" id="trsvg31"><tspan id="trsvg3">140 000</tspan></text></switch>
     <switch><text transform="translate( -880,-1200)" x="0" y="0.7ex" id="trsvg32-id" systemLanguage="id"><tspan id="trsvg4-id">120 000</tspan></text><text transform="translate( -880,-1200)" x="0" y="0.7ex" id="trsvg32"><tspan id="trsvg4">120 000</tspan></text></switch>
     <switch><text transform="translate( -880,-1000)" x="0" y="0.7ex" id="trsvg33-id" systemLanguage="id"><tspan id="trsvg5-id">100 000</tspan></text><text transform="translate( -880,-1000)" x="0" y="0.7ex" id="trsvg33"><tspan id="trsvg5">100 000</tspan></text></switch>
     <switch><text transform="translate( -880, -800)" x="0" y="0.7ex" id="trsvg34-id" systemLanguage="id"><tspan id="trsvg6-id">80 000</tspan></text><text transform="translate( -880, -800)" x="0" y="0.7ex" id="trsvg34"><tspan id="trsvg6">80 000</tspan></text></switch>
     <switch><text transform="translate( -880, -600)" x="0" y="0.7ex" id="trsvg35-id" systemLanguage="id"><tspan id="trsvg7-id">60 000</tspan></text><text transform="translate( -880, -600)" x="0" y="0.7ex" id="trsvg35"><tspan id="trsvg7">60 000</tspan></text></switch>
