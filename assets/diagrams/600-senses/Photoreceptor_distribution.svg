     <switch><text transform="translate( -600,   60)" x="0" y="0.7ex" id="trsvg39-id" systemLanguage="id"><tspan id="trsvg11-id">60°</tspan></text><text transform="translate( -600,   60)" x="0" y="0.7ex" id="trsvg39"><tspan id="trsvg11">60°</tspan></text></switch>
     <switch><text transform="translate( -400,   60)" x="0" y="0.7ex" id="trsvg40-id" systemLanguage="id"><tspan id="trsvg12-id">60°</tspan></text><text transform="translate( -400,   60)" x="0" y="0.7ex" id="trsvg40"><tspan id="trsvg12">40°</tspan></text></switch>
     <switch><text transform="translate( -200,   60)" x="0" y="0.7ex" id="trsvg41-id" systemLanguage="id"><tspan id="trsvg13-id">20°</tspan></text><text transform="translate( -200,   60)" x="0" y="0.7ex" id="trsvg41"><tspan id="trsvg13">20°</tspan></text></switch>
     <switch><text transform="translate(    0,   60)" x="0" y="0.7ex" id="trsvg42-id" systemLanguage="id"><tspan id="trsvg14-id">0°</tspan></text><text transform="translate(    0,   60)" x="0" y="0.7ex" id="trsvg42"><tspan id="trsvg14"> 0°</tspan></text></switch>
     <switch><text transform="translate(  200,   60)" x="0" y="0.7ex" id="trsvg43-id" systemLanguage="id"><tspan id="trsvg15-id">20°</tspan></text><text transform="translate(  200,   60)" x="0" y="0.7ex" id="trsvg43"><tspan id="trsvg15">20°</tspan></text></switch>
     <switch><text transform="translate(  400,   60)" x="0" y="0.7ex" id="trsvg44-id" systemLanguage="id"><tspan id="trsvg16-id">40°</tspan></text><text transform="translate(  400,   60)" x="0" y="0.7ex" id="trsvg44"><tspan id="trsvg16">40°</tspan></text></switch>
     <switch><text transform="translate(  600,   60)" x="0" y="0.7ex" id="trsvg45-id" systemLanguage="id"><tspan id="trsvg17-id">60°</tspan></text><text transform="translate(  600,   60)" x="0" y="0.7ex" id="trsvg45"><tspan id="trsvg17">60°</tspan></text></switch>
